<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>음악 신청 관리 — HebronGuide</title>
<style>
  :root {
    --bg:#0d1117; --surface:rgba(255,255,255,0.04); --surface2:rgba(255,255,255,0.07);
    --border:rgba(255,255,255,0.09); --text:#e6edf3; --muted:rgba(255,255,255,0.45);
    --green:rgba(110,231,183,1); --red:#f87171; --gold:#C9A227;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Manrope',sans-serif;min-height:100vh;padding:24px 16px 60px;}
  h1{font-size:1.25rem;font-weight:800;margin-bottom:4px;}
  .sub{font-size:.78rem;color:var(--muted);margin-bottom:24px;}
  .tabs{display:flex;gap:6px;margin-bottom:20px;}
  .tab{padding:6px 16px;border-radius:20px;font-size:.78rem;font-weight:700;cursor:pointer;border:1px solid var(--border);background:none;color:var(--muted);transition:.15s;}
  .tab.active{background:rgba(110,231,183,.15);border-color:rgba(110,231,183,.4);color:var(--green);}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px;transition:.15s;}
  .card:hover{background:var(--surface2);}
  .card-top{display:flex;align-items:flex-start;gap:12px;}
  .thumb{width:80px;height:45px;border-radius:8px;background:#111;flex-shrink:0;overflow:hidden;}
  .thumb img{width:100%;height:100%;object-fit:cover;}
  .info{flex:1;min-width:0;}
  .vid-id{font-size:.75rem;color:var(--muted);margin-bottom:2px;}
  .name{font-size:.85rem;font-weight:700;margin-bottom:2px;}
  .meta{font-size:.72rem;color:var(--muted);}
  .msg{font-size:.75rem;color:rgba(255,255,255,0.55);margin-top:6px;padding:6px 10px;background:rgba(255,255,255,.04);border-radius:8px;font-style:italic;}
  .actions{display:flex;gap:8px;margin-top:12px;}
  .btn{padding:6px 16px;border-radius:8px;font-size:.75rem;font-weight:700;cursor:pointer;border:none;transition:.15s;}
  .btn-approve{background:rgba(110,231,183,.2);color:var(--green);border:1px solid rgba(110,231,183,.35);}
  .btn-approve:hover{background:rgba(110,231,183,.35);}
  .btn-reject{background:rgba(248,113,113,.12);color:var(--red);border:1px solid rgba(248,113,113,.3);}
  .btn-reject:hover{background:rgba(248,113,113,.25);}
  .btn-played{background:rgba(255,255,255,.06);color:var(--muted);border:1px solid var(--border);}
  .badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:.65rem;font-weight:700;}
  .badge-pending{background:rgba(251,191,36,.12);color:#fbbf24;border:1px solid rgba(251,191,36,.3);}
  .badge-approved{background:rgba(110,231,183,.12);color:var(--green);border:1px solid rgba(110,231,183,.3);}
  .badge-played{background:rgba(255,255,255,.06);color:var(--muted);border:1px solid var(--border);}
  .badge-rejected{background:rgba(248,113,113,.1);color:var(--red);border:1px solid rgba(248,113,113,.25);}
  .empty{text-align:center;padding:48px 0;color:var(--muted);font-size:.85rem;}
  .back{display:inline-flex;align-items:center;gap:6px;font-size:.78rem;color:var(--muted);text-decoration:none;margin-bottom:20px;}
  .back:hover{color:var(--text);}
  .count-badge{background:rgba(110,231,183,.15);color:var(--green);border-radius:20px;font-size:.65rem;font-weight:800;padding:1px 7px;margin-left:4px;}
  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(16,20,36,.97);border:1px solid rgba(110,231,183,.3);color:var(--green);padding:10px 20px;border-radius:12px;font-size:.8rem;font-weight:700;display:none;z-index:9999;}
</style>
</head>
<body>

<a href="/ops.html" class="back">← 운영 대시보드</a>
<h1>음악 신청 관리</h1>
<p class="sub">커뮤니티 곡 신청을 검토하고 승인합니다. 승인된 곡은 앱 플레이어 "신청곡" 탭에서 재생됩니다.</p>

<div class="tabs">
  <button class="tab active" onclick="filterBy('pending')">대기 중 <span id="cnt-pending" class="count-badge">0</span></button>
  <button class="tab" onclick="filterBy('approved')">승인됨 <span id="cnt-approved" class="count-badge">0</span></button>
  <button class="tab" onclick="filterBy('played')">재생완료 <span id="cnt-played" class="count-badge">0</span></button>
  <button class="tab" onclick="filterBy('rejected')">거절됨 <span id="cnt-rejected" class="count-badge">0</span></button>
</div>

<div id="list"></div>
<div id="toast"></div>

<script>
const SB_URL  = "https://vextxqzggznulwpganwt.supabase.co/rest/v1/music_requests";
const SB_KEY  = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZleHR4cXpnZ3pudWx3cGdhbnd0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTQ4NjIyNDMsImV4cCI6MjAzMDQzODI0M30.B7n4J5FMZhbFBxRu6FJiuAFf7ydJHDCHfJ0VPqVz4dc";

let allData = [];
let curFilter = "pending";

async function load() {
  const r = await fetch(`${SB_URL}?order=created_at.desc&limit=200`, {
    headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` }
  });
  allData = await r.json();
  updateCounts();
  render();
}

function updateCounts() {
  ["pending","approved","played","rejected"].forEach(s => {
    const el = document.getElementById("cnt-" + s);
    if (el) el.textContent = allData.filter(d => d.status === s).length;
  });
}

function filterBy(status) {
  curFilter = status;
  document.querySelectorAll(".tab").forEach((t,i) => {
    t.classList.toggle("active", ["pending","approved","played","rejected"][i] === status);
  });
  render();
}

function render() {
  const items = allData.filter(d => d.status === curFilter);
  const list = document.getElementById("list");
  if (!items.length) { list.innerHTML = `<div class="empty">신청곡이 없습니다.</div>`; return; }
  list.innerHTML = items.map(item => `
    <div class="card" id="card-${item.id}">
      <div class="card-top">
        <div class="thumb">
          <img src="https://img.youtube.com/vi/${item.video_id}/mqdefault.jpg" alt="" loading="lazy">
        </div>
        <div class="info">
          <div class="vid-id">
            <a href="https://youtu.be/${item.video_id}" target="_blank" style="color:rgba(110,231,183,.7);text-decoration:none;">youtu.be/${item.video_id} ↗</a>
          </div>
          <div class="name">${item.requester_name || "익명"}</div>
          <div class="meta">
            원하는 시간: ${item.time_pref || "언제나"} &nbsp;·&nbsp;
            ${new Date(item.created_at).toLocaleDateString("ko-KR")}
            &nbsp;<span class="badge badge-${item.status}">${{pending:"대기",approved:"승인",played:"재생완료",rejected:"거절"}[item.status]}</span>
          </div>
          ${item.message ? `<div class="msg">"${item.message}"</div>` : ""}
        </div>
      </div>
      <div class="actions">
        ${item.status !== "approved" ? `<button class="btn btn-approve" onclick="update('${item.id}','approved')">승인</button>` : ""}
        ${item.status === "approved" ? `<button class="btn btn-played" onclick="update('${item.id}','played')">재생완료</button>` : ""}
        ${item.status !== "rejected" ? `<button class="btn btn-reject" onclick="update('${item.id}','rejected')">거절</button>` : ""}
      </div>
    </div>
  `).join("");
}

async function update(id, status) {
  const r = await fetch(`${SB_URL}?id=eq.${id}`, {
    method: "PATCH",
    headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}`, "Content-Type": "application/json", Prefer: "return=minimal" },
    body: JSON.stringify({ status }),
  });
  if (r.ok || r.status === 204) {
    const item = allData.find(d => d.id === id);
    if (item) item.status = status;
    updateCounts();
    render();
    showToast({ approved: "승인되었습니다", played: "재생완료 처리", rejected: "거절되었습니다" }[status]);
  }
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.style.display = "block";
  setTimeout(() => { t.style.display = "none"; }, 2500);
}

load();
</script>
</body>
</html>
