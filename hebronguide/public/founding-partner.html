<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HebronGuide — 교회 정보 올리기</title>
<meta http-equiv="refresh" content="0; url=/seattle/">
<style>
  body { margin:0; background:#0d1117; display:flex; align-items:center; justify-content:center; min-height:100vh; font-family:'Noto Sans KR',sans-serif; color:#ECFDF5; }
  .msg { text-align:center; }
  .logo { font-family:Cinzel,serif; color:#C9A227; font-size:1.4rem; font-weight:900; margin-bottom:12px; }
  p { color:rgba(236,253,245,.6); font-size:.9rem; }
  a { color:#6EE7B7; }
</style>
</head>
<body>
<div class="msg">
  <div class="logo">HebronGuide</div>
  <p>교회 탭으로 이동합니다...<br>
  <a href="/seattle/">바로 이동 →</a></p>
</div>
<script>window.location.replace('/seattle/');</script>
<script>
/* HebronGuide — 도시 자동 복귀 (모든 사용자가 자기 도시로) */
(function(){
  function detectCity(){
    var p=new URLSearchParams(location.search);
    if(p.get('city'))return p.get('city');
    var ref=document.referrer;
    if(ref){var m=ref.match(/hebronguide\.com\/([a-z]+)\//);if(m&&m[1])return m[1];}
    var segs=location.pathname.split('/').filter(Boolean);
    if(segs.length&&segs[0].indexOf('.')<0)return segs[0];
    return'seattle';
  }
  var city=detectCity();
  if(city!=='seattle'){
    document.querySelectorAll('a[href*="/seattle/"]').forEach(function(a){
      a.href=a.href.replace(/\/seattle\//g,'/'+city+'/');
    });
  }
})();
</script>
</body>
</html>
