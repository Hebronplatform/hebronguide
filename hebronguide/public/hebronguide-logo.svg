<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 270 70">

  <!-- ═══ COMPASS ICON (70×70, center 35,35) ═══ -->

  <!-- Outer ring -->
  <circle cx="35" cy="35" r="34" fill="#1a2e6c"/><circle cx="35" cy="35" r="31" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="0.8"/>

  <!-- N point — Gold (Genesis 1314: "Look North") -->
  <polygon points="35,8 44,27 35,35 26,27" fill="#C9A227"/>

  <!-- S point — White -->
  <polygon points="35,62 44,44 35,35 26,44" fill="rgba(255,255,255,0.82)"/>

  <!-- E point — White, lighter -->
  <polygon points="62,35 44,44 35,35 44,27" fill="rgba(255,255,255,0.55)"/>

  <!-- W point — White, lighter -->
  <polygon points="8,35 26,27 35,35 26,44"  fill="rgba(255,255,255,0.55)"/>

  <!-- Center dot -->
  <circle cx="35" cy="35" r="2.8" fill="rgba(255,255,255,0.95)"/>

  <!-- ═══ WORDMARK ═══ -->
  <text x="80" y="42"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="24" font-weight="700"
        fill="white"
        style="letter-spacing:0.02em;">HebronGuide</text>

  <!-- TM superscript -->
  <text x="255" y="26"
        font-family="Arial, sans-serif"
        font-size="8"
        fill="rgba(255,255,255,0.45)">&#8482;</text>

  <!-- Tagline -->
  <text x="80" y="57"
        font-family="Arial, Helvetica, sans-serif"
        font-size="7.2"
        fill="rgba(255,255,255,0.4)"
        style="letter-spacing:0.11em;">KNOW YOUR CITY. FIND YOUR PEOPLE.</text>

</svg>
