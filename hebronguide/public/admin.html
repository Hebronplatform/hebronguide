<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HebronGuide 관리자 대시보드</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="/icon-192.png">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    :root {
      --bg:     #0a0c10;
      --surface:#13161d;
      --card:   #1a1d26;
      --border: rgba(255,255,255,.07);
      --border2:rgba(255,255,255,.12);
      --gold:   #C9A227;
      --mint:   #6EE7B7;
      --text:   #e8edf3;
      --muted:  #7a8491;
      --red:    #f87171;
      --green:  #4ade80;
      --yellow: #fbbf24;
      --blue:   #60a5fa;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, 'Noto Sans KR', 'Segoe UI', sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── 로그인 ── */
    #login-gate {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .login-box {
      width: 100%;
      max-width: 340px;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 16px;
      padding: 36px 32px;
      text-align: center;
    }
    .login-logo {
      font-size: 1rem;
      font-weight: 800;
      color: var(--gold);
      letter-spacing: .02em;
      margin-bottom: 6px;
    }
    .login-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }
    .login-sub {
      font-size: .8rem;
      color: var(--muted);
      margin-bottom: 28px;
    }
    .login-box input[type=password] {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-size: .9rem;
      outline: none;
      margin-bottom: 10px;
      transition: border-color .2s;
    }
    .login-box input[type=password]:focus { border-color: var(--gold) }
    .login-btn {
      width: 100%;
      background: linear-gradient(135deg, var(--gold), #e8b53a);
      color: #0a0c10;
      font-weight: 800;
      font-size: .9rem;
      border: none;
      padding: 11px;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity .2s;
    }
    .login-btn:hover { opacity: .88 }
    #login-msg {
      margin-top: 12px;
      font-size: .8rem;
      padding: 8px 12px;
      border-radius: 6px;
      display: none;
    }
    #login-msg.ok  { background: rgba(74,222,128,.1); border: 1px solid rgba(74,222,128,.25); color: var(--green) }
    #login-msg.err { background: rgba(248,113,113,.1); border: 1px solid rgba(248,113,113,.25); color: var(--red) }

    /* ── 앱 레이아웃 ── */
    #app { display: none }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10,12,16,.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 52px;
    }
    .topbar-left { display: flex; align-items: center; gap: 12px }
    .topbar-logo { font-size: .95rem; font-weight: 800; color: var(--gold) }
    .topbar-badge {
      font-size: .68rem;
      font-weight: 700;
      background: rgba(201,162,39,.15);
      color: var(--gold);
      border: 1px solid rgba(201,162,39,.3);
      border-radius: 4px;
      padding: 2px 7px;
      letter-spacing: .04em;
    }
    .logout-btn {
      background: none;
      border: 1px solid var(--border2);
      color: var(--muted);
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: .78rem;
      transition: .2s;
    }
    .logout-btn:hover { border-color: var(--red); color: var(--red) }

    .main { max-width: 1160px; margin: 0 auto; padding: 24px 20px 60px }

    /* ── 통계 카드 ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .stat-icon {
      width: 40px; height: 40px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
    }
    .stat-icon.gold   { background: rgba(201,162,39,.15) }
    .stat-icon.mint   { background: rgba(110,231,183,.12) }
    .stat-icon.blue   { background: rgba(96,165,250,.12) }
    .stat-icon.red    { background: rgba(248,113,113,.12) }
    .stat-icon.purple { background: rgba(167,139,250,.12) }
    .stat-num  { font-size: 1.6rem; font-weight: 800; color: var(--text); line-height: 1 }
    .stat-label{ font-size: .72rem; color: var(--muted); margin-top: 3px }

    /* ── 섹션 카드 ── */
    .section-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 16px;
      overflow: hidden;
    }
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
    }
    .section-title {
      font-size: .72rem;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    .section-title.gold  { color: var(--gold) }
    .section-title.mint  { color: var(--mint) }
    .section-body { padding: 16px 18px }

    /* ── 운영 허브 그리드 ── */
    .hub-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 8px;
    }
    .hub-link {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--card);
      text-decoration: none;
      color: var(--text);
      font-size: .8rem;
      font-weight: 600;
      transition: border-color .2s, background .2s;
    }
    .hub-link:hover { border-color: var(--border2); background: rgba(255,255,255,.04) }
    .hub-link.kakao { background: #FEE500; color: #3C1E1E; border-color: #FEE500 }
    .hub-link.kakao:hover { opacity: .9 }

    /* ── AI 큐레이션 컨트롤 ── */
    .ai-controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center }
    .ai-controls select, .ai-controls .ctrl-select {
      background: var(--card);
      border: 1px solid var(--border2);
      color: var(--text);
      padding: 7px 11px;
      border-radius: 7px;
      font-size: .82rem;
      cursor: pointer;
      outline: none;
    }
    .ai-controls select:focus { border-color: var(--mint) }
    .ai-btn {
      padding: 7px 16px;
      border-radius: 7px;
      border: none;
      font-size: .82rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .2s;
    }
    .ai-btn.mint  { background: var(--mint);  color: #0a0c10 }
    .ai-btn.gold  { background: var(--gold);  color: #0a0c10 }
    .ai-btn:hover { opacity: .85 }
    #curator-status {
      font-size: .8rem;
      color: var(--muted);
      padding: 6px 0 0;
      min-height: 22px;
    }

    /* ── 주간 리뷰 패널 ── */
    #review-panel {
      background: var(--surface);
      border: 1px solid rgba(201,162,39,.2);
      border-radius: 12px;
      padding: 16px 18px;
      margin-bottom: 16px;
      display: none;
    }
    .review-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .review-count {
      font-size: .72rem;
      font-weight: 700;
      background: rgba(201,162,39,.2);
      color: var(--gold);
      border-radius: 20px;
      padding: 2px 10px;
    }
    #review-list { display: flex; flex-direction: column; gap: 8px }
    .review-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 14px;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .review-meta { font-size: .72rem; color: var(--muted); margin-bottom: 3px }
    .review-title { font-size: .85rem; font-weight: 700; margin-bottom: 4px }
    .review-value { font-size: .76rem; color: var(--mint); line-height: 1.5 }
    .review-source { font-size: .7rem; color: var(--muted); margin-top: 3px }
    .review-actions { display: flex; gap: 5px; flex-shrink: 0 }

    /* ── 탭 + 필터 ── */
    .content-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .tabs {
      display: flex;
      gap: 2px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 3px;
    }
    .tab {
      padding: 6px 13px;
      border-radius: 6px;
      cursor: pointer;
      font-size: .8rem;
      color: var(--muted);
      border: none;
      background: none;
      transition: .15s;
      white-space: nowrap;
      font-weight: 500;
    }
    .tab.active { background: var(--gold); color: #0a0c10; font-weight: 700 }
    .tab:hover:not(.active) { color: var(--text) }
    .tab svg { width: 14px; height: 14px; vertical-align: -2px; margin-right: 4px; }

    .filters { display: flex; gap: 8px; align-items: center; flex-wrap: wrap }
    .filter-input {
      background: var(--surface);
      border: 1px solid var(--border2);
      color: var(--text);
      padding: 6px 11px;
      border-radius: 7px;
      font-size: .8rem;
      outline: none;
      min-width: 180px;
    }
    .filter-input:focus { border-color: var(--mint) }
    .filter-select {
      background: var(--surface);
      border: 1px solid var(--border2);
      color: var(--text);
      padding: 6px 11px;
      border-radius: 7px;
      font-size: .8rem;
      cursor: pointer;
    }
    .count-badge { font-size: .78rem; color: var(--muted) }

    /* ── 테이블 ── */
    .table-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse }
    thead th {
      padding: 10px 14px;
      text-align: left;
      color: var(--muted);
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .04em;
      text-transform: uppercase;
      background: rgba(255,255,255,.02);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    tbody td {
      padding: 11px 14px;
      border-bottom: 1px solid rgba(255,255,255,.03);
      vertical-align: middle;
      font-size: .83rem;
    }
    tbody tr:last-child td { border-bottom: none }
    tbody tr:hover td { background: rgba(255,255,255,.015) }

    /* ── 셀 스타일 ── */
    .cell-name { font-weight: 600; max-width: 160px }
    .cell-sub  { font-size: .72rem; color: var(--muted); margin-top: 2px }
    .cell-desc {
      color: var(--muted);
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: .8rem;
    }
    .cell-city {
      font-size: .72rem;
      background: rgba(255,255,255,.06);
      border: 1px solid var(--border);
      padding: 2px 7px;
      border-radius: 4px;
      white-space: nowrap;
    }
    .cell-date { color: var(--muted); font-size: .75rem; white-space: nowrap }
    .cell-contact { font-size: .78rem; color: var(--mint) }

    /* ── 상태 뱃지 ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: .72rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .badge.pending  { background: rgba(251,191,36,.1);  color: var(--yellow); border: 1px solid rgba(251,191,36,.2) }
    .badge.approved { background: rgba(74,222,128,.1);  color: var(--green);  border: 1px solid rgba(74,222,128,.2) }
    .badge.rejected { background: rgba(248,113,113,.1); color: var(--red);    border: 1px solid rgba(248,113,113,.2) }
    .badge.default  { background: rgba(110,231,183,.08);color: var(--mint);   border: 1px solid rgba(110,231,183,.2) }
    /* 기존 .status 호환 */
    .status { display: inline-flex; align-items: center; gap: 3px; padding: 2px 8px; border-radius: 10px; font-size: .72rem; font-weight: 600 }
    .status.pending  { background: rgba(251,191,36,.1);  color: var(--yellow); border: 1px solid rgba(251,191,36,.2) }
    .status.approved { background: rgba(74,222,128,.1);  color: var(--green);  border: 1px solid rgba(74,222,128,.2) }
    .status.rejected { background: rgba(248,113,113,.1); color: var(--red);    border: 1px solid rgba(248,113,113,.2) }
    .status.community{ background: rgba(110,231,183,.08);color: var(--mint);   border: 1px solid rgba(110,231,183,.2) }

    /* ── 버튼 ── */
    .actions { display: flex; gap: 5px; flex-wrap: nowrap }
    .btn-sm {
      padding: 4px 9px;
      border-radius: 5px;
      font-size: .74rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid;
      transition: .15s;
      white-space: nowrap;
    }
    .btn-approve { background: rgba(74,222,128,.08);  border-color: rgba(74,222,128,.25); color: var(--green) }
    .btn-approve:hover { background: rgba(74,222,128,.18) }
    .btn-reject  { background: rgba(248,113,113,.08); border-color: rgba(248,113,113,.25); color: var(--red) }
    .btn-reject:hover  { background: rgba(248,113,113,.18) }
    .btn-delete  { background: transparent; border-color: var(--border); color: var(--muted) }
    .btn-delete:hover  { border-color: var(--red); color: var(--red) }
    .btn-edit    { background: rgba(201,162,39,.08);  border-color: rgba(201,162,39,.2);  color: var(--gold) }
    .btn-edit:hover    { background: rgba(201,162,39,.16) }

    /* ── 빈 상태 / 로딩 ── */
    .empty   { text-align: center; padding: 48px 20px; color: var(--muted) }
    .empty-icon { font-size: 1.8rem; margin-bottom: 10px; opacity: .5 }
    .loading { text-align: center; padding: 32px; color: var(--muted) }
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid var(--border2);
      border-top-color: var(--mint);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg) } }

    /* ── 토스트 ── */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: var(--card);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: 9px 20px;
      font-size: .85rem;
      opacity: 0;
      transition: .25s;
      z-index: 9999;
      pointer-events: none;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0) }

    /* ── 리포트 차트 ── */
    .reports-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }
    @media (max-width: 860px) { .reports-grid { grid-template-columns: 1fr } }

    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 20px;
    }
    .chart-title {
      font-size: .72rem;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
    }
    .bar-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .bar-label {
      font-size: .75rem;
      color: var(--muted);
      width: 90px;
      flex-shrink: 0;
      text-align: right;
    }
    .bar-track {
      flex: 1;
      height: 8px;
      background: rgba(255,255,255,.06);
      border-radius: 4px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width .6s ease;
    }
    .bar-fill.gold   { background: linear-gradient(90deg, #C9A227, #f0c040) }
    .bar-fill.mint   { background: linear-gradient(90deg, #6EE7B7, #34d399) }
    .bar-fill.blue   { background: linear-gradient(90deg, #60a5fa, #818cf8) }
    .bar-fill.purple { background: linear-gradient(90deg, #a78bfa, #c084fc) }
    .bar-fill.red    { background: linear-gradient(90deg, #f87171, #fb923c) }
    .bar-num {
      font-size: .75rem;
      font-weight: 700;
      color: var(--text);
      width: 28px;
      text-align: right;
      flex-shrink: 0;
    }
    .summary-table { width: 100%; border-collapse: collapse; margin-top: 4px }
    .summary-table th {
      font-size: .7rem; font-weight: 600; letter-spacing: .04em; text-transform: uppercase;
      color: var(--muted); padding: 6px 10px; border-bottom: 1px solid var(--border);
      text-align: left;
    }
    .summary-table td {
      font-size: .8rem; padding: 8px 10px;
      border-bottom: 1px solid rgba(255,255,255,.03);
    }
    .summary-table tr:last-child td { border-bottom: none }
    .summary-table tr:hover td { background: rgba(255,255,255,.02) }
    .dot {
      display: inline-block; width: 8px; height: 8px;
      border-radius: 50%; margin-right: 7px; flex-shrink: 0;
    }

    /* ── 반응형 ── */
    @media (max-width: 640px) {
      .tabs { flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch }
      .actions { flex-direction: column }
      .content-header { flex-direction: column; align-items: flex-start }
      .stats-grid { grid-template-columns: repeat(2, 1fr) }
      .hub-grid { grid-template-columns: repeat(2, 1fr) }
    }

    /* ── 상세 모달 ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 9000;
      background: rgba(0,0,0,.65); backdrop-filter: blur(4px);
      justify-content: center; align-items: flex-start;
      padding: 40px 16px;
      overflow-y: auto;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: #1a1d26;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 18px;
      width: 100%; max-width: 560px;
      padding: 28px 24px 24px;
      position: relative;
      box-shadow: 0 20px 60px rgba(0,0,0,.5);
    }
    .modal-close {
      position: absolute; top: 16px; right: 16px;
      background: rgba(255,255,255,.08); border: none;
      color: #e8edf3; width: 32px; height: 32px;
      border-radius: 50%; cursor: pointer; font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    .modal-close:hover { background: rgba(255,255,255,.16); }
    .modal-title {
      font-size: 1.05rem; font-weight: 800;
      color: var(--gold); margin-bottom: 20px;
      padding-right: 40px; line-height: 1.4;
    }
    .modal-fields { display: flex; flex-direction: column; gap: 12px; }
    .modal-field { display: flex; flex-direction: column; gap: 4px; }
    .modal-label {
      font-size: .7rem; font-weight: 700; letter-spacing: .06em;
      color: var(--muted); text-transform: uppercase;
    }
    .modal-value {
      font-size: .88rem; color: #e8edf3;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 10px; padding: 10px 14px;
      white-space: pre-wrap; word-break: break-word;
      line-height: 1.65;
    }
    .modal-value a { color: var(--mint); }
    .modal-actions {
      display: flex; gap: 8px; margin-top: 20px; flex-wrap: wrap;
    }
    tbody tr { cursor: pointer; }
    tbody tr:hover td { background: rgba(201,162,39,.06) !important; }
  </style>
</head>
<body>

<div id="toast"></div>

<!-- ── 상세 모달 ── -->
<div class="modal-overlay" id="detailModal" onclick="closeModal(event)">
  <div class="modal-box">
    <button class="modal-close" onclick="closeDetailModal()">✕</button>
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-fields" id="modalFields"></div>
    <div class="modal-actions" id="modalActions"></div>
  </div>
</div>

<!-- ── 로그인 ── -->
<div id="login-gate">
  <div class="login-box">
    <div class="login-logo">⚡ HebronGuide</div>
    <h1 class="login-title">관리자 대시보드</h1>

<script>
  // 단일 Supabase 프로젝트 — vextxqzggznulwpganwt (모든 테이블)
  const MAIN_URL   = 'https://vextxqzggznulwpganwt.supabase.co'
  const MAIN_KEY   = 'sb_publishable_j1cYftObx8VDVkEQAvluXg_rn20pnfX'
  const NEW_URL    = 'https://vextxqzggznulwpganwt.supabase.co'
  const NEW_KEY    = 'sb_publishable_j1cYftObx8VDVkEQAvluXg_rn20pnfX'
  const SERVICE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZleHR4cXpnZ3pudWx3cGdhbnd0Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3ODgxNTM5MiwiZXhwIjoyMDk0MzkxMzkyfQ.7WRbWtAMe15DbQZ3lQoho9tRJXNwdxZPuP99lz3-epI'

  let sbMain = null, sbNew = null, session = null
  let currentTab = 'community'
  let allData = []
  let adminToken = null  // 로그인 성공 시 설정 — API 인증에 사용

  // ── Supabase 초기화 ────────────────────────────────────────
  function initSB() {
    if (!window.supabase) return false
    sbMain = window.supabase.createClient(MAIN_URL, MAIN_KEY)
    sbNew  = window.supabase.createClient(NEW_URL, NEW_KEY)
    return true
  }

  // ── 비밀번호 해시 (SHA-256) ──────────────────────────────
  const PW_HASH = '614fea13745bbaa53de1c1c36b216c3cd5009df185b9f642089eb7ea76a69b90'
  const SESSION_KEY = 'hg_admin_session'
  const SESSION_DAYS = 7

  async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str))
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('')
  }

  // ── 비밀번호 로그인 ──────────────────────────────────────
  async function checkPassword() {
    const pw = document.getElementById('pw-input').value
    if (!pw) return
    const hash = await sha256(pw)
    adminToken = hash  // 메모리에 저장 — API 인증 토큰으로 사용
    if (hash !== PW_HASH) {
      showMsg('❌ 비밀번호가 틀렸습니다', 'err')
      return
    }
    // 세션 저장 (7일)
    const expiry = Date.now() + SESSION_DAYS * 24 * 60 * 60 * 1000
    localStorage.setItem(SESSION_KEY, JSON.stringify({ expiry }))
    initSB()
    showApp({ email: 'admin' })
  }

  // ── 세션 확인 ────────────────────────────────────────────
  function checkSession() {
    try {
      const s = JSON.parse(localStorage.getItem(SESSION_KEY) || '{}')
      return s.expiry && s.expiry > Date.now()
    } catch { return false }
  }

  function logout() {
    localStorage.removeItem(SESSION_KEY)
    document.getElementById('app').style.display = 'none'
    document.getElementById('login-gate').style.display = 'flex'
  }

  function showMsg(text, type) {
    const el = document.getElementById('login-msg')
    el.textContent = text
    el.className = type
    el.style.display = 'block'
  }

  // ── 탭 전환 ─────────────────────────────────────────────
  function switchTab(tab) {
    currentTab = tab
    document.querySelectorAll('.tab').forEach((t, i) => {
      const tabs = ['community','churches','restaurants','promo','partners','stories','logs','planner']
      t.classList.toggle('active', tabs[i] === tab)
    })
    document.getElementById('search').value = ''
    loadTabData(tab)
  }

  // ── 데이터 로드 ──────────────────────────────────────────
  async function loadTabData(tab) {
    setTableLoading()
    try {
      if (tab === 'community') {
        // community_items + content_items 두 테이블 합쳐서 조회
        const [r1, r2] = await Promise.allSettled([
          sbNew.from('community_items').select('*').order('created_at', { ascending: false }),
          sbNew.from('content_items').select('*').order('created_at', { ascending: false }),
        ])
        const d1 = r1.status === 'fulfilled' ? (r1.value.data || []) : []
        const d2 = r2.status === 'fulfilled' ? (r2.value.data || []) : []
        // 교회·사업체·홍보 신청은 각 전용 탭에서 처리 → 여기서 제외
        const ROUTED_CATS = ['church', 'church_application', 'business', 'promo']
        allData = [...d1, ...d2]
          .filter(r => !ROUTED_CATS.includes(r.category))
          .sort((a,b) => new Date(b.created_at||0) - new Date(a.created_at||0))
        renderCommunity(allData)
      } else if (tab === 'churches') {
        const { data: churchData } = await sbMain.from('churches').select('*').order('created_at', { ascending: false }).limit(200)
        const { data: appData } = await sbMain.from('community_items').select('*').eq('category', 'church').order('created_at', { ascending: false }).limit(100)
        allData = churchData || []
        renderChurches(allData, appData || [])
      } else if (tab === 'restaurants') {
        const { data: dataR } = await sbMain.from('restaurants').select('*').order('created_at', { ascending: false }).limit(100)
        const { data: dataC } = await sbMain.from('cafes').select('*').order('created_at', { ascending: false }).limit(100)
        const { data: bizApps } = await sbMain.from('community_items').select('*').eq('category', 'business').order('created_at', { ascending: false }).limit(100)
        allData = [...(dataR || []), ...(dataC || [])]
        renderRestaurants(allData, bizApps || [])
      } else if (tab === 'promo') {
        const { data: promoApps } = await sbMain.from('community_items').select('*').eq('category', 'promo').order('created_at', { ascending: false }).limit(100)
        allData = promoApps || []
        renderPromo(allData)
      } else if (tab === 'partners') {
        const { data } = await sbNew.from('pastor_partners').select('*').order('joined_at', { ascending: false })
        allData = data || []
        renderPartners(allData)
      } else if (tab === 'stories') {
        const { data } = await sbNew.from('stories').select('*').order('created_at', { ascending: false })
        allData = data || []
        renderStories(allData)
      } else if (tab === 'logs') {
        const { data } = await sbNew.from('ai_query_logs').select('*').order('created_at', { ascending: false }).limit(100)
        allData = data || []
        renderLogs(allData)
      } else if (tab === 'planner') {
        renderPlanner()
      }
    } catch(e) {
      document.getElementById('table-content').innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div>${e.message}</div>`
    }
  }

  // ── 커뮤니티 글 렌더링 ──────────────────────────────────
  function renderCommunity(data) {
    if (!data.length) { setEmpty('커뮤니티 글이 없습니다'); return }

    // 도시 신청 분리 표시
    const cityReqs = data.filter(r => r.category === 'city_request')
    const others   = data.filter(r => r.category !== 'city_request')

    document.getElementById('count-badge').textContent = `${data.length}개`

    const cityReqHtml = cityReqs.length ? `
      <div style="margin-bottom:16px;padding:12px 16px;background:rgba(249,115,22,0.08);border:1px solid rgba(249,115,22,0.3);border-radius:10px;">
        <div style="font-size:.8rem;font-weight:700;color:#F97316;margin-bottom:8px;">🗺️ 도시 추가 신청 (${cityReqs.length}건)</div>
        <table style="width:100%;">
          <thead><tr><th>신청 도시</th><th>신청자</th><th>내용</th><th>상태</th><th>날짜</th><th>액션</th></tr></thead>
          <tbody>
            ${cityReqs.map(r => `
              <tr onclick="showDetail(${JSON.stringify(r).replace(/"/g,'&quot;')}, 'community')" style="cursor:pointer;" title="클릭하여 전체 내용 보기">
                <td><div class="cell-name" style="color:#F97316;">${esc(r.city || r.title || '—')}</div></td>
                <td><div class="cell-contact">${esc(r.name || r.contact || '—')}</div></td>
                <td><div class="cell-desc">${esc((r.description || '').slice(0, 60))}${(r.description||'').length > 60 ? ' <span style="color:var(--gold);font-size:.75rem;">더보기 →</span>' : ''}</div></td>
                <td><span class="status ${r.status === 'approved' ? 'approved' : r.status === 'rejected' ? 'rejected' : 'pending'}">${r.status === 'approved' ? '✅ 확인' : r.status === 'rejected' ? '❌ 보류' : '⏳ 대기'}</span></td>
                <td><div class="cell-date">${fmtDate(r.created_at)}</div></td>
                <td><div class="actions" onclick="event.stopPropagation()">
                  ${r.status !== 'approved' ? `<button class="btn-sm btn-approve" onclick="updateStatus('${r.id}','community_items','new','approved')">✅ 확인</button>` : ''}
                  <button class="btn-sm btn-delete" onclick="deleteRow('${r.id}','community_items','new')">🗑</button>
                </div></td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>` : ''

    document.getElementById('table-content').innerHTML = cityReqHtml + `
      <table>
        <thead><tr>
          <th>제목·이름</th><th>내용</th><th>도시</th><th>연락처</th><th>상태</th><th>날짜</th><th>액션</th>
        </tr></thead>
        <tbody>
          ${others.map(r => `
            <tr data-id="${r.id}" data-table="community_items" data-db="main" onclick="showDetail(${JSON.stringify(r).replace(/"/g,'&quot;')}, 'community')" title="클릭하여 전체 내용 보기">
              <td>
                <div class="cell-name">${esc(r.title || r.business_name || r.name || '(제목없음)')}</div>
                <div class="cell-sub">${esc(r.category || r.type || '')}</div>
              </td>
              <td><div class="cell-desc">${esc((r.description || r.content || '').slice(0, 60))}${(r.description || r.content || '').length > 60 ? ' <span style="color:var(--gold);font-size:.75rem;font-weight:700;">더보기 →</span>' : ''}</div></td>
              <td><span class="cell-city">${esc(r.city_slug || r.city || '—')}</span></td>
              <td>
                <div class="cell-contact">${esc(r.phone || r.contact || '—')}</div>
                <div class="cell-sub">${esc(r.website || r.url || '')}</div>
              </td>
              <td>
                <span class="status ${r.status || 'community'}">${r.status === 'approved' ? '✅ 승인' : r.status === 'rejected' ? '❌ 거절' : '💬 커뮤니티'}</span>
                ${r.notified_at ? `<div style="font-size:.65rem;color:var(--mint);margin-top:3px;">📧 ${fmtDate(r.notified_at)} 발송완료</div>` : r.status==='approved' ? `<div style="font-size:.65rem;color:rgba(248,113,113,.7);margin-top:3px;">📧 발송 미확인</div>` : ''}
                ${r.confidence_score != null ? `<div style="font-size:.65rem;color:${r.auto_approved ? 'var(--mint)' : 'var(--yellow)'};margin-top:3px;">🤖 AI ${r.confidence_score}점${r.auto_approved ? ' · 자동게시' : ''}</div>` : ''}
              </td>
              <td><div class="cell-date">${fmtDate(r.created_at)}</div></td>
              <td><div class="actions" onclick="event.stopPropagation()">
                ${r.status !== 'approved' ? `<button class="btn-sm btn-approve" onclick="updateStatus('${r.id}','community_items','new','approved')">✅ 승인</button>` : ''}
                ${r.status !== 'rejected' ? `<button class="btn-sm btn-reject" onclick="updateStatus('${r.id}','community_items','new','rejected')">❌ 거절</button>` : ''}
                <button class="btn-sm btn-delete" onclick="deleteRow('${r.id}','community_items','new')">🗑</button>
              </div></td>
            </tr>`).join('')}
        </tbody>

  function plannerAsk(q) {

    plannerSend()

  async function plannerSend() {
    const input = document.getElementById('planner-input')
    const q = input.value.trim()
    if (!q) return

    const chat = document.getElementById('planner-chat')
    const btn  = document.getElementById('planner-btn')

    // 사용자 메시지 추가
    const prevEmpty = chat.querySelector('[style*="40px 0"]')
    if (prevEmpty) prevEmpty.remove()

    chat.innerHTML += `
      <div style="text-align:right;">
        <div style="display:inline-block;background:rgba(201,162,39,.15);border:1px solid rgba(201,162,39,.3);
          border-radius:12px 12px 2px 12px;padding:9px 14px;max-width:80%;font-size:.83rem;
          color:var(--text);line-height:1.7;text-align:left;">${esc(q)}</div>
      </div>`

    // 로딩
    const loadId = 'pl-load-' + Date.now()
    chat.innerHTML += `
      <div id="${loadId}" style="display:flex;align-items:center;gap:8px;color:var(--mint);font-size:.8rem;">
        <span style="animation:spin 1s linear infinite;display:inline-block;">⟳</span> 분석 중...
      </div>`
    chat.scrollTop = chat.scrollHeight

    input.value = ''
    btn.disabled = true
    btn.textContent = '처리 중...'

    try {
      const res = await fetch('/api/city-planner', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          token: adminToken,
          question: q,
          history: plannerHistory,
        }),
      })
      const data = await res.json()
      if (!res.ok || data.error) throw new Error(data.error || '응답 실패')

      // 히스토리 업데이트
      plannerHistory.push({ role: 'user', content: q })
      plannerHistory.push({ role: 'assistant', content: data.answer })

      // 로딩 제거 + 답변 삽입
      document.getElementById(loadId)?.remove()
      const formatted = data.answer
        .replace(/\n\n/g, '</p><p style="margin-top:10px;">')
        .replace(/\n/g, '<br>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/^#{1,3} (.+)/gm, '<div style="font-weight:900;color:var(--mint);margin:8px 0 4px;">$1</div>')

      chat.innerHTML += `
        <div style="display:flex;gap:8px;align-items:flex-start;">
          <div style="font-size:1.1rem;flex-shrink:0;margin-top:2px;">🌏</div>
          <div style="background:rgba(255,255,255,.04);border:1px solid var(--border2);
            border-radius:2px 12px 12px 12px;padding:12px 14px;flex:1;font-size:.82rem;
            color:var(--text);line-height:1.8;"><p>${formatted}</p></div>
        </div>`

    } catch(e) {
      document.getElementById(loadId)?.remove()
      chat.innerHTML += `<div style="color:#F87171;font-size:.8rem;">⚠️ ${esc(e.message)}</div>`
    }

    chat.scrollTop = chat.scrollHeight
    btn.disabled = false
    btn.textContent = '전송 →'
  }

  // ── 데이터 조작 — /api/admin-action 경유 (서비스 키 사용, RLS 우회) ──
  async function adminAction(payload) {
    const res = await fetch('/api/admin-action', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ...payload, token: adminToken }),
    })
    const json = await res.json().catch(() => ({ error: `HTTP ${res.status}` }))
    if (!res.ok || json.error) throw new Error(json.error || '요청 실패')
    return json
  }

  async function updateStatus(id, table, db, status) {
    try {
      const r = await adminAction({ action: 'update_status', id, table, status })
      toast(`✅ ${r.msg || (status === 'approved' ? '승인 완료' : '거절 완료')}`)

      // 승인 시 카테고리별 자동 처리
      if (status === 'approved' && table === 'community_items') {
        const row = allData.find(d => d.id === id)
        if (row) {
          if (['church','church_application'].includes(row.category)) {
            await autoAddChurch(row)
          } else if (row.category === 'business') {
            await autoAddBusiness(row)
          } else if (row.category === 'promo') {
            await autoAddPromo(row)
          }
        }
      }

      loadTabData(currentTab)
    } catch(e) { toast('❌ ' + e.message) }
  }

  // 교회 신청 → churches 테이블 자동 파싱·저장
  async function autoAddChurch(row) {
    try {
      const desc = row.description || ''
      const get = (label) => {
        const m = desc.match(new RegExp(label + '[:\\s]+([^\\n]+)'))
        return m ? m[1].trim() : ''
      }
      const nameKo  = get('교회명\\(KO\\)') || get('교회명') || row.name || ''
      const nameEn  = get('교회명\\(EN\\)') || nameKo
      const pastor  = get('담임목사\\(KO\\)') || get('담임목사') || ''
      const pastorEn= get('담임목사\\(EN\\)') || pastor
      const city    = get('도시') || row.city_slug || ''
      const phone   = get('전화') || row.phone || ''
      const email   = get('이메일') || row.contact || ''
      const website = get('웹사이트') || ''
      const denom   = get('교단') || ''
      const service = get('예배시간') || ''
      const intro   = desc.split('소개:')[1]?.trim() || ''
      const hebron  = /Hebron.*협력교회.*✅|✅.*Hebron/.test(desc)
      const hcmi    = /가정교회.*✅|HCMI.*✅|✅.*HCMI/.test(desc)

      // 한글 도시명 → slug 변환 맵 (구형 신청서 / 직접 입력 대응)
      const churchCitySlugMap = {

        '시애틀':'seattle','달라스':'dallas','다라스':'dallas',
        '뉴욕':'newyork','뉴저지':'newyork',
        '로스앤젤레스':'la','엘에이':'la','l.a.':'la','la':'la',
        '샌프란시스코':'sf','베이에어리어':'sf',
        '휴스턴':'houston','애틀랜타':'atlanta',
        '워싱턴':'dc','워싱턴dc':'dc','페어팩스':'dc','센터빌':'dc','버지니아':'dc','노던버지니아':'dc',

        '마이애미':'miami','캔자스시티':'kansascity','필라델피아':'philadelphia',
        '피닉스':'phoenix','미니애폴리스':'minneapolis','덴버':'denver',
        '샌디에고':'sandiego','토론토':'toronto',
        '밴쿠버':'vancouver','화이트락':'vancouver','white rock':'vancouver','화이트 락':'vancouver',
        '캘거리':'calgary','에드먼튼':'edmonton','오타와':'ottawa','위니펙':'winnipeg',
        '프린스조지':'princgeorge','prince george':'princgeorge',
        '시드니':'sydney','멜버른':'melbourne','브리즈번':'brisbane','오클랜드':'auckland',
        '런던':'london','도쿄':'tokyo','오사카':'osaka','싱가포르':'singapore',
        '방콕':'bangkok','두바이':'dubai','베를린':'berlin','프랑크푸르트':'frankfurt',
        '파리':'paris','암스테르담':'amsterdam',
        '멕시코시티':'mexicocity','과달라하라':'guadalajara','몬테레이':'monterrey',
      }
      const cityLower = city.toLowerCase().trim()
      const citySlug = churchCitySlugMap[cityLower]
        || city.toLowerCase().replace(/[^a-z0-9]/g, '').replace('princegeorge', 'princgeorge')
        || ''

      const descText = [
        '✅ 파트너 교회',
        city ? `📍 ${city}` : '',
        service ? `🕐 ${service}` : '',
        phone ? `☎ ${phone}` : '',
        email ? `✉️ ${email}` : '',
        website && website !== '없음' ? `🔗 ${website}` : '',
        pastor ? `✨ 담임: ${pastor} 목사` : '',
        intro ? `\n${intro}` : '',

      const churchData = {
        name:        nameKo,
        name_en:     nameEn,
        city:        city,
        city_slug:   citySlug,
        description: descText,
        pastor:      pastor,
        pastor_en:   pastorEn,
        phone:       phone,

        denomination:denom,
        service_time:service,

      // 파트너 교회에 확인 이메일 자동 발송

  // 사업체 신청 → restaurants/cafes 테이블 자동 파싱·저장

      const address      = get('주소') || ''
      const website      = get('웹사이트') || ''

      const pastorEmail  = get('추천목사이메일') || ''

      // 도시 → slug 변환

        '로스앤젤레스':'la','시애틀':'seattle','달라스':'dallas','뉴욕':'newyork',
        'l.a.':'la','la':'la','seattle':'seattle','dallas':'dallas',

      const citySlug = citySlugMap[cityRaw.toLowerCase()] || cityRaw.toLowerCase().replace(/[^a-z0-9]/g,'')

      const descText = [

        address ? `📍 ${address}` : '',
        phone ? `☎ ${phone}` : '',

  // ── 검색·필터 ────────────────────────────────────────────
  function filterTable() {
    const q = document.getElementById('search').value.toLowerCase()
    const city = document.getElementById('city-filter').value
    const status = document.getElementById('status-filter').value

    const rows = document.querySelectorAll('tbody tr')
    let visible = 0
    rows.forEach(row => {
      const text = row.textContent.toLowerCase()
      const cityMatch = !city || text.includes(city)
      const statusMatch = !status || text.includes(status)
      const searchMatch = !q || text.includes(q)
      const show = cityMatch && statusMatch && searchMatch
      row.style.display = show ? '' : 'none'
      if (show) visible++
    })
    document.getElementById('count-badge').textContent = `${visible}개 표시`
  }

  // ── 상세 모달 ─────────────────────────────────────────────
  function showDetail(r, tableKey) {
    const labelMap = {
      name: '이름·교회명', title: '제목', business_name: '사업체명',
      description: '내용 (전체)', content: '내용 (전체)',
      city_slug: '도시', city: '도시', address: '주소',
      phone: '전화', contact: '연락처', email: '이메일',
      website: '웹사이트', url: 'URL',
      category: '카테고리', type: '유형', status: '상태',
      denomination: '교단', tier: 'Tier',
      created_at: '신청일시', updated_at: '수정일시',
    }
    const skipKeys = ['id','user_id','auth_uid']

    document.getElementById('modalTitle').textContent =
      r.title || r.business_name || r.name || '(제목없음)'

    const fieldsEl = document.getElementById('modalFields')
    fieldsEl.innerHTML = Object.entries(r)
      .filter(([k, v]) => !skipKeys.includes(k) && v !== null && v !== '' && v !== undefined)
      .map(([k, v]) => {
        const label = labelMap[k] || k
        let val = String(v)
        if (k === 'created_at' || k === 'updated_at') val = new Date(v).toLocaleString('ko-KR')
        if (k === 'status') val = v === 'approved' ? '✅ 승인' : v === 'rejected' ? '❌ 거절' : v === 'pending' ? '⏳ 대기' : v
        return `<div class="modal-field">
          <div class="modal-label">${label}</div>
          <div class="modal-value">${esc(val)}</div>
        </div>`
      }).join('')

    // 액션 버튼
    const actEl = document.getElementById('modalActions')
    actEl.innerHTML = ''
    if (tableKey === 'community') {
      if (r.status !== 'approved') actEl.innerHTML += `<button class="btn-sm btn-approve" onclick="updateStatus('${r.id}','community_items','new','approved');closeDetailModal()">✅ 승인</button>`
      if (r.status !== 'rejected') actEl.innerHTML += `<button class="btn-sm btn-reject" onclick="updateStatus('${r.id}','community_items','new','rejected');closeDetailModal()">❌ 거절</button>`
      actEl.innerHTML += `<button class="btn-sm btn-delete" onclick="deleteRow('${r.id}','community_items','new');closeDetailModal()">🗑 삭제</button>`
    }

    document.getElementById('detailModal').classList.add('open')
  }
  function closeDetailModal() { document.getElementById('detailModal').classList.remove('open') }
  function closeModal(e) { if (e.target === document.getElementById('detailModal')) closeDetailModal() }
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetailModal() })

  // ── 유틸 ─────────────────────────────────────────────────
  function esc(s) { return String(s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;') }
  function fmtDate(d) { if (!d) return '—'; return new Date(d).toLocaleDateString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) }
  function setTableLoading() { document.getElementById('table-content').innerHTML = '<div class="loading"><span class="spinner"></span>로딩 중...</div>' }
  function setEmpty(msg) { document.getElementById('table-content').innerHTML = `<div class="empty"><div class="empty-icon">📭</div>${msg}</div>` }
  function toast(msg) {
    const el = document.getElementById('toast')
    el.textContent = msg
    el.classList.add('show')
    setTimeout(() => el.classList.remove('show'), 2500)
  }

  // ── 주간 리뷰 패널 ───────────────────────────────────────
  async function loadReviews() {
    if (!sbNew) return
    const { data } = await sbNew.from('content_reviews')
      .select('*').eq('status','pending').order('created_at',{ascending:false}).limit(50)
    if (!data || data.length === 0) {
      document.getElementById('review-panel').style.display = 'none'
      return
    }
    document.getElementById('review-panel').style.display = 'block'
    document.getElementById('review-count').textContent = `${data.length}건`
    const ICONS = { settle:'🏠', food:'🍽️', church:'⛪', explore:'🗺️', job:'💼', edu:'📚' }
    document.getElementById('review-list').innerHTML = data.map(r => `
      <div class="review-item">
        <div style="flex:1">
          <div class="review-meta">
            ${ICONS[r.section]||'📌'} ${r.city_name} · ${r.section} · <span style="color:${r.confidence==='high'?'var(--green)':r.confidence==='low'?'var(--red)':'var(--yellow)'}">${r.confidence}</span>
          </div>
          <div class="review-title">${esc(r.title)}</div>
          ${r.proposed_value ? `<div class="review-value">${esc(r.proposed_value.slice(0,120))}</div>` : ''}
          ${r.source ? `<div class="review-source">출처: ${esc(r.source)}</div>` : ''}
        </div>
        <div class="review-actions">
          <button class="btn-sm btn-approve" onclick="approveReview('${r.id}')">✅</button>
          <button class="btn-sm btn-reject" onclick="rejectReview('${r.id}')">❌</button>
        </div>
      </div>`).join('')
  }

  async function runWeeklyReview() {
    const cityVal = document.getElementById('curator-city').value
    if (!cityVal) { toast('❌ 도시를 선택해주세요'); return }
    const [citySlug, cityName] = cityVal.split('|')
    const status = document.getElementById('curator-status')
    status.textContent = `🔍 ${cityName} 주간 리뷰 중...`
    status.style.color = 'var(--gold)'
    try {
      const res = await fetch('/api/city-reviewer', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ citySlug, cityName, token: adminToken }),
      })
      const data = await res.json()
      if (!res.ok) throw new Error(data.error)
      status.textContent = `✅ ${data.message}`
      status.style.color = 'var(--green)'
      loadReviews()
    } catch(e) {
      status.textContent = `❌ ${e.message}`
      status.style.color = 'var(--red)'
    }
  }

  async function approveReview(id) {
    try {
      await adminAction({ action: 'update_status', id, table: 'content_reviews', status: 'approved' })
      toast('✅ 승인됨 — 다음 배포 시 반영됩니다')
      loadReviews()
    } catch(e) { toast('❌ ' + e.message) }
  }

  async function rejectReview(id) {
    try {
      await adminAction({ action: 'update_status', id, table: 'content_reviews', status: 'rejected' })
      toast('❌ 거절됨')
      loadReviews()
    } catch(e) { toast('❌ ' + e.message) }
  }

  // ── AI 자동 큐레이션 ─────────────────────────────────────
  async function runCurator() {
    const cityVal = document.getElementById('curator-city').value
    const section = document.getElementById('curator-section').value
    const status  = document.getElementById('curator-status')

    if (!cityVal) { toast('❌ 도시를 선택해주세요'); return }

    const [citySlug, cityName] = cityVal.split('|')
    status.textContent = `🤖 ${cityName} — ${section === 'all' ? '전체 섹션' : section} 조사 중... (1-2분 소요)`
    status.style.color = 'var(--mint)'

    try {
      const res = await fetch('/api/content-curator', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ city: cityName, citySlug, section, token: adminToken }),
      })
      const data = await res.json()
      if (!res.ok) throw new Error(data.error || '요청 실패')

      const saved = Object.values(data.results || {}).reduce((sum, r) => sum + (r.saved || 0), 0)
      status.textContent = `✅ 완료! ${saved}개 항목이 저장됐습니다. 커뮤니티 글 탭에서 검토·승인하세요.`
      status.style.color = 'var(--green)'
      loadTabData('community')
      loadStats()
    } catch(e) {
      status.textContent = `❌ ${e.message}`
      status.style.color = 'var(--red)'
    }
  }

  // ── 도시 필터 자동 로드 (cities.json) ─────────────────────
  async function loadCityFilter() {
    const sel = document.getElementById('city-filter')
    if (!sel) return
    try {
      const res = await fetch('/cities.json?v=' + Date.now())
      if (!res.ok) throw new Error('cities.json 로드 실패')
      const cities = await res.json()

      const groups = {}
      cities.forEach(c => {
        const region = c.region || '기타'
        if (!groups[region]) groups[region] = []
        groups[region].push(c)
      })

      sel.innerHTML = '<option value="">모든 도시</option>'
      Object.entries(groups).forEach(([region, list]) => {
        const grp = document.createElement('optgroup')
        grp.label = region
        list.forEach(c => {
          const opt = document.createElement('option')
          opt.value = c.slug
          opt.textContent = c.nameKo || c.slug
          grp.appendChild(opt)
        })
        sel.appendChild(grp)
      })
    } catch (e) {
      sel.innerHTML = '<option value="">모든 도시</option>'
      console.warn('cities.json 로드 실패:', e.message)
    }
  }

  // ── 초기화 ───────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    if (window.lucide) window.lucide.createIcons()
    if (checkSession()) {
      adminToken = PW_HASH
      initSB()
      showApp({ email: 'admin' })
    }
    document.getElementById('pw-input')?.addEventListener('keydown', e => {
      if (e.key === 'Enter') checkPassword()
    })
  })

  function showApp(user) {
    document.getElementById('login-gate').style.display = 'none'
    document.getElementById('app').style.display = 'block'
    document.getElementById('admin-email').textContent = user.email || ''
    loadCityFilter()
    loadStats()
    loadTabData('community')
    loadReviews()
    loadReports()
  }

  // ── 리포트 차트 로드 ─────────────────────────────────────
  async function loadReports() {
    try {
      // 도시별 신청 현황
      const { data: communityData } = await sbNew
        .from('community_items').select('city_slug, status')
      if (!communityData) return

      document.getElementById('reports-section').style.display = 'grid'

      // 도시별 집계
      const cityCount = {}
      communityData.forEach(r => {
        const city = r.city_slug || '기타'
        cityCount[city] = (cityCount[city] || 0) + 1
      })
      const sorted = Object.entries(cityCount)
        .sort((a,b) => b[1]-a[1]).slice(0, 8)
      const maxVal = sorted[0]?.[1] || 1
      const COLORS = ['gold','mint','blue','purple','red','mint','gold','blue']
      const cityLabels = {
        seattle:'시애틀', dallas:'달라스', houston:'휴스턴', la:'LA',
        newyork:'뉴욕', chicago:'시카고', toronto:'토론토', sf:'SF',
        atlanta:'애틀랜타', dc:'워싱턴DC', boston:'보스턴', vancouver:'밴쿠버',
      }

      document.getElementById('city-bars').innerHTML = sorted.map(([city, cnt], i) => `
        <div class="bar-row">
          <div class="bar-label">${cityLabels[city] || city}</div>
          <div class="bar-track">
            <div class="bar-fill ${COLORS[i]}" style="width:${Math.round(cnt/maxVal*100)}%"></div>
          </div>
          <div class="bar-num">${cnt}</div>
        </div>`).join('') || '<div style="color:var(--muted);font-size:.8rem;padding:8px">데이터 없음</div>'

      // 카테고리 요약 집계
      const pending  = communityData.filter(r => r.status === 'pending').length
      const approved = communityData.filter(r => r.status === 'approved').length
      document.getElementById('sum-community-total').textContent   = communityData.length
      document.getElementById('sum-community-pending').textContent = pending
      document.getElementById('sum-community-approved').textContent= approved

      // 교회·식당·파트너·이야기 상세 집계
      const [ch, rs, pr, st] = await Promise.allSettled([
        sbMain.from('churches').select('active'),
        sbMain.from('restaurants').select('active'),
        sbNew.from('pastor_partners').select('verified'),
        sbNew.from('stories').select('featured'),
      ])
      if (ch.status==='fulfilled' && ch.value.data) {
        const d = ch.value.data
        document.getElementById('sum-churches-total').textContent  = d.length
        document.getElementById('sum-churches-active').textContent = d.filter(r=>r.active).length
      }
      if (rs.status==='fulfilled' && rs.value.data) {
        const d = rs.value.data
        document.getElementById('sum-restaurants-total').textContent  = d.length
        document.getElementById('sum-restaurants-active').textContent = d.filter(r=>r.active).length
      }
      if (pr.status==='fulfilled' && pr.value.data) {
        const d = pr.value.data
        document.getElementById('sum-partners-total').textContent    = d.length
        document.getElementById('sum-partners-pending').textContent  = d.filter(r=>!r.verified).length
        document.getElementById('sum-partners-verified').textContent = d.filter(r=>r.verified).length
      }
      if (st.status==='fulfilled' && st.value.data) {
        const d = st.value.data
        document.getElementById('sum-stories-total').textContent    = d.length
        document.getElementById('sum-stories-featured').textContent = d.filter(r=>r.featured).length
      }
    } catch(e) {
      console.warn('loadReports 실패:', e.message)
    }
  }
</script>
