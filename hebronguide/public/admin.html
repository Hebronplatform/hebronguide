<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HebronGuide 관리자 대시보드</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="/icon-192.png">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #0d1117; --card: #161b22; --border: rgba(255,255,255,.1);
      --gold: #C9A227; --mint: #6EE7B7; --text: #e6edf3; --muted: #8b949e;
      --red: #f87171; --green: #4ade80; --yellow: #fbbf24;
    }
    * { box-sizing: border-box; margin: 0; padding: 0 }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, 'Noto Sans KR', sans-serif; min-height: 100vh }

    /* ── 헤더 ── */
    .header { background: var(--card); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100 }
    .header-left { display: flex; align-items: center; gap: 10px }
    .header-logo { font-size: 1.1rem; font-weight: 800; color: var(--gold) }
    .header-sub { font-size: .8rem; color: var(--muted) }
    .badge-admin { background: rgba(248,113,113,.15); border: 1px solid rgba(248,113,113,.3); color: var(--red); border-radius: 6px; padding: 2px 8px; font-size: .75rem; font-weight: 700 }

    /* ── 로그인 ── */
    #login-gate { max-width: 360px; margin: 80px auto; text-align: center; padding: 0 20px }
    .login-icon { font-size: 3rem; margin-bottom: 12px }
    .login-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 8px }
    .login-note { color: var(--muted); font-size: .85rem; margin-bottom: 24px }
    input[type=email] { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; color: var(--text); font-size: .95rem; outline: none; margin-bottom: 10px; transition: .2s }
    input[type=email]:focus { border-color: var(--mint) }
    .btn { width: 100%; background: linear-gradient(135deg, var(--gold), #e8b53a); color: #000; font-weight: 700; border: none; padding: 11px; border-radius: 8px; cursor: pointer; font-size: .95rem }
    .btn:hover { opacity: .9 }
    #login-msg { margin-top: 10px; font-size: .85rem; padding: 8px 12px; border-radius: 6px; display: none }
    #login-msg.ok { background: rgba(74,222,128,.1); border: 1px solid rgba(74,222,128,.3); color: var(--green) }
    #login-msg.err { background: rgba(248,113,113,.1); border: 1px solid rgba(248,113,113,.3); color: var(--red) }

    /* ── 메인 ── */
    #app { display: none }
    .container { max-width: 1100px; margin: 0 auto; padding: 20px 16px }

    /* ── 통계 바 ── */
    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 20px }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px }
    .stat-num { font-size: 1.8rem; font-weight: 800; color: var(--mint) }
    .stat-label { font-size: .75rem; color: var(--muted); margin-top: 2px }

    /* ── 탭 ── */
    .tabs { display: flex; gap: 4px; margin-bottom: 16px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 4px; width: fit-content }
    .tab { padding: 7px 14px; border-radius: 7px; cursor: pointer; font-size: .85rem; color: var(--muted); border: none; background: none; transition: .2s; white-space: nowrap }
    .tab.active { background: var(--gold); color: #000; font-weight: 700 }
    .tab:hover:not(.active) { color: var(--text) }

    /* ── 필터 바 ── */
    .filter-bar { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; align-items: center }
    .filter-select { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 7px 12px; border-radius: 7px; font-size: .85rem; cursor: pointer }
    .search-input { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 7px 12px; border-radius: 7px; font-size: .85rem; outline: none; min-width: 200px }
    .search-input:focus { border-color: var(--mint) }
    .count-badge { font-size: .8rem; color: var(--muted) }

    /* ── 테이블 ── */
    .table-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden }
    table { width: 100%; border-collapse: collapse; font-size: .85rem }
    th { padding: 10px 14px; text-align: left; color: var(--muted); font-weight: 600; font-size: .78rem; background: rgba(255,255,255,.03); border-bottom: 1px solid var(--border); white-space: nowrap }
    td { padding: 10px 14px; border-bottom: 1px solid rgba(255,255,255,.04); vertical-align: top }
    tr:last-child td { border-bottom: none }
    tr:hover td { background: rgba(255,255,255,.02) }

    /* ── 상태 뱃지 ── */
    .status { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 12px; font-size: .75rem; font-weight: 600 }
    .status.pending { background: rgba(251,191,36,.1); color: var(--yellow); border: 1px solid rgba(251,191,36,.2) }
    .status.approved { background: rgba(74,222,128,.1); color: var(--green); border: 1px solid rgba(74,222,128,.2) }
    .status.rejected { background: rgba(248,113,113,.1); color: var(--red); border: 1px solid rgba(248,113,113,.2) }
    .status.community { background: rgba(110,231,183,.1); color: var(--mint); border: 1px solid rgba(110,231,183,.2) }

    /* ── 액션 버튼 ── */
    .actions { display: flex; gap: 6px; flex-wrap: nowrap }
    .btn-sm { padding: 4px 10px; border-radius: 6px; font-size: .78rem; font-weight: 600; cursor: pointer; border: 1px solid; transition: .2s; white-space: nowrap }
    .btn-approve { background: rgba(74,222,128,.1); border-color: rgba(74,222,128,.3); color: var(--green) }
    .btn-approve:hover { background: rgba(74,222,128,.2) }
    .btn-reject { background: rgba(248,113,113,.1); border-color: rgba(248,113,113,.3); color: var(--red) }
    .btn-reject:hover { background: rgba(248,113,113,.2) }
    .btn-delete { background: rgba(255,255,255,.05); border-color: var(--border); color: var(--muted) }
    .btn-delete:hover { border-color: var(--red); color: var(--red) }
    .btn-edit { background: rgba(201,162,39,.08); border-color: rgba(201,162,39,.2); color: var(--gold) }
    .btn-edit:hover { background: rgba(201,162,39,.15) }

    /* ── 셀 스타일 ── */
    .cell-name { font-weight: 600; max-width: 160px }
    .cell-desc { color: var(--muted); max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap }
    .cell-city { font-size: .78rem; background: rgba(255,255,255,.06); padding: 2px 7px; border-radius: 4px }
    .cell-date { color: var(--muted); font-size: .78rem; white-space: nowrap }
    .cell-contact { font-size: .8rem; color: var(--mint) }

    /* ── 빈 상태 ── */
    .empty { text-align: center; padding: 40px; color: var(--muted) }
    .empty-icon { font-size: 2rem; margin-bottom: 8px }

    /* ── 로딩 ── */
    .loading { text-align: center; padding: 30px; color: var(--muted) }
    .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--mint); border-radius: 50%; animation: spin .7s linear infinite; margin-right: 8px }
    @keyframes spin { to { transform: rotate(360deg) } }

    /* ── 토스트 ── */
    #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 10px 20px; font-size: .9rem; opacity: 0; transition: .3s; z-index: 999; pointer-events: none }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0) }

    @media (max-width: 600px) {
      .tabs { flex-wrap: nowrap; overflow-x: auto }
      .actions { flex-direction: column }
    }
  </style>
</head>
<body>

<div id="toast"></div>

<!-- ── 로그인 ── -->
<div id="login-gate">
  <div class="login-icon">🛡️</div>
  <h1 class="login-title">관리자 로그인</h1>
  <p class="login-note">HebronGuide 운영팀 전용</p>
  <div class="input-group">
    <label>비밀번호</label>
    <input type="password" id="pw-input" placeholder="비밀번호 입력" autocomplete="current-password">
  </div>
  <button class="btn-primary" onclick="checkPassword()">🔐 로그인</button>
  <div id="login-msg"></div>
  <div id="login-msg"></div>
</div>

<!-- ── 앱 ── -->
<div id="app">

  <div class="header">
    <div class="header-left">
      <span class="header-logo">⚡ HebronGuide</span>
      <span class="badge-admin">ADMIN</span>
      <span class="header-sub" id="admin-email"></span>
    </div>
    <button onclick="logout()" style="background:none;border:1px solid var(--border);color:var(--muted);padding:5px 12px;border-radius:6px;cursor:pointer;font-size:.8rem">로그아웃</button>
  </div>

  <div class="container">

    <!-- 운영 허브 -->
    <div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin-bottom:16px">
      <div style="font-size:.75rem;font-weight:800;color:var(--gold);letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px">⚡ 운영 허브 — 빠른 실행</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:8px">
        <a href="/church-join.html" target="_blank" style="display:flex;align-items:center;gap:8px;background:rgba(201,162,39,.08);border:1px solid rgba(201,162,39,.2);border-radius:8px;padding:10px 12px;text-decoration:none;color:var(--text);font-size:.83rem;font-weight:600">⛪ 교회 등록 페이지</a>
        <a href="/register.html" target="_blank" style="display:flex;align-items:center;gap:8px;background:rgba(110,231,183,.06);border:1px solid rgba(110,231,183,.15);border-radius:8px;padding:10px 12px;text-decoration:none;color:var(--text);font-size:.83rem;font-weight:600">🔗 통합 등록 허브</a>
        <a href="/church-guide.html" target="_blank" style="display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;padding:10px 12px;text-decoration:none;color:var(--text);font-size:.83rem;font-weight:600">📋 교회 안내 페이지</a>
        <a href="/story-submit.html" target="_blank" style="display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;padding:10px 12px;text-decoration:none;color:var(--text);font-size:.83rem;font-weight:600">📝 이야기 제출</a>
        <a href="/pastor-dashboard.html" target="_blank" style="display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;padding:10px 12px;text-decoration:none;color:var(--text);font-size:.83rem;font-weight:600">📊 목사 대시보드</a>
        <a href="https://pf.kakao.com/_dxdxlbX" target="_blank" style="display:flex;align-items:center;gap:8px;background:#FEE500;border-radius:8px;padding:10px 12px;text-decoration:none;color:#3C1E1E;font-size:.83rem;font-weight:800">💛 카카오 채널</a>
      </div>
    </div>

    <!-- 통계 -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-num" id="st-community">—</div>
        <div class="stat-label">커뮤니티 글</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="st-churches">—</div>
        <div class="stat-label">교회 등록</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="st-restaurants">—</div>
        <div class="stat-label">식당·카페</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="st-partners">—</div>
        <div class="stat-label">파트너 목사</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="st-stories">—</div>
        <div class="stat-label">이야기</div>
      </div>
    </div>

    <!-- 탭 -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab('community')">💬 커뮤니티 글</button>
      <button class="tab" onclick="switchTab('churches')">⛪ 교회</button>
      <button class="tab" onclick="switchTab('restaurants')">🍜 식당·카페</button>
      <button class="tab" onclick="switchTab('partners')">✝️ 파트너 목사</button>
      <button class="tab" onclick="switchTab('stories')">📖 이야기</button>
      <button class="tab" onclick="switchTab('logs')">📊 AI 질의 로그</button>
    </div>

    <!-- 필터 -->
    <div class="filter-bar">
      <input class="search-input" id="search" placeholder="🔍 검색..." oninput="filterTable()">
      <select class="filter-select" id="city-filter" onchange="filterTable()">
        <option value="">모든 도시</option>
        <option value="seattle">시애틀</option>
        <option value="dallas">달라스</option>
        <option value="toronto">토론토</option>
        <option value="london">런던</option>
        <option value="seoul">서울</option>
        <option value="tokyo">도쿄</option>
      </select>
      <select class="filter-select" id="status-filter" onchange="filterTable()">
        <option value="">모든 상태</option>
        <option value="pending">대기중</option>
        <option value="approved">승인됨</option>
        <option value="rejected">거절됨</option>
      </select>
      <span class="count-badge" id="count-badge"></span>
    </div>

    <!-- 테이블 -->
    <div class="table-wrap">
      <div id="table-content">
        <div class="loading"><span class="spinner"></span>데이터 로딩 중...</div>
      </div>
    </div>

  </div>
</div>

<script>
  const MAIN_URL  = 'https://okhfjzofifmsgssgajts.supabase.co'
  const MAIN_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9raGZqem9maWZtc2dzc2dhanRzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MDQ5NDksImV4cCI6MjA5MjE4MDk0OX0.jNHf3a4IeDJvaqlq5PSBRT0BYp4iKCQKRkdya3D-5F8'
  const NEW_URL   = 'https://vextxqzggznulwpganwt.supabase.co'
  const NEW_KEY   = 'sb_publishable_j1cYftObx8VDVkEQAvluXg_rn20pnfX'

  let sbMain = null, sbNew = null, session = null
  let currentTab = 'community'
  let allData = []

  // ── Supabase 초기화 ────────────────────────────────────────
  function initSB() {
    if (!window.supabase) return false
    sbMain = window.supabase.createClient(MAIN_URL, MAIN_KEY)
    sbNew  = window.supabase.createClient(NEW_URL, NEW_KEY)
    return true
  }

  // ── 비밀번호 해시 (SHA-256) ──────────────────────────────
  const PW_HASH = '248001227e1ea4270e357d3f1d2dfc14c2d72a774ac0eda0e0b4449a14bb92f7'
  const SESSION_KEY = 'hg_admin_session'
  const SESSION_DAYS = 7

  async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str))
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('')
  }

  // ── 비밀번호 로그인 ──────────────────────────────────────
  async function checkPassword() {
    const pw = document.getElementById('pw-input').value
    if (!pw) return
    const hash = await sha256(pw)
    if (hash !== PW_HASH) {
      showMsg('❌ 비밀번호가 틀렸습니다', 'err')
      return
    }
    // 세션 저장 (7일)
    const expiry = Date.now() + SESSION_DAYS * 24 * 60 * 60 * 1000
    localStorage.setItem(SESSION_KEY, JSON.stringify({ expiry }))
    initSB()
    showApp({ email: 'admin' })
  }

  // ── 세션 확인 ────────────────────────────────────────────
  function checkSession() {
    try {
      const s = JSON.parse(localStorage.getItem(SESSION_KEY) || '{}')
      return s.expiry && s.expiry > Date.now()
    } catch { return false }
  }

  function logout() {
    localStorage.removeItem(SESSION_KEY)
    document.getElementById('app').style.display = 'none'
    document.getElementById('login-gate').style.display = 'block'
  }

  function showMsg(text, type) {
    const el = document.getElementById('login-msg')
    el.textContent = text
    el.className = type
    el.style.display = 'block'
  }

  async function logout() {
    await sbMain?.auth.signOut()
    document.getElementById('app').style.display = 'none'
    document.getElementById('login-gate').style.display = 'block'
    session = null
  }

  // ── 탭 전환 ─────────────────────────────────────────────
  function switchTab(tab) {
    currentTab = tab
    document.querySelectorAll('.tab').forEach((t, i) => {
      const tabs = ['community','churches','restaurants','partners','stories','logs']
      t.classList.toggle('active', tabs[i] === tab)
    })
    document.getElementById('search').value = ''
    loadTabData(tab)
  }

  // ── 데이터 로드 ──────────────────────────────────────────
  async function loadTabData(tab) {
    setTableLoading()
    try {
      if (tab === 'community') {
        const { data } = await sbMain.from('community_items').select('*').order('created_at', { ascending: false })
        allData = data || []
        renderCommunity(allData)
      } else if (tab === 'churches') {
        const { data } = await sbMain.from('churches').select('*').order('created_at', { ascending: false }).limit(200)
        allData = data || []
        renderChurches(allData)
      } else if (tab === 'restaurants') {
        const { dataR } = await sbMain.from('restaurants').select('*').order('created_at', { ascending: false }).limit(100)
        const { data: dataC } = await sbMain.from('cafes').select('*').order('created_at', { ascending: false }).limit(100)
        allData = [...(dataR || []), ...(dataC || [])]
        renderRestaurants(allData)
      } else if (tab === 'partners') {
        const { data } = await sbNew.from('pastor_partners').select('*').order('joined_at', { ascending: false })
        allData = data || []
        renderPartners(allData)
      } else if (tab === 'stories') {
        const { data } = await sbNew.from('stories').select('*').order('created_at', { ascending: false })
        allData = data || []
        renderStories(allData)
      } else if (tab === 'logs') {
        const { data } = await sbNew.from('ai_query_logs').select('*').order('created_at', { ascending: false }).limit(100)
        allData = data || []
        renderLogs(allData)
      }
    } catch(e) {
      document.getElementById('table-content').innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div>${e.message}</div>`
    }
  }

  // ── 커뮤니티 글 렌더링 ──────────────────────────────────
  function renderCommunity(data) {
    if (!data.length) { setEmpty('커뮤니티 글이 없습니다'); return }
    document.getElementById('count-badge').textContent = `${data.length}개`
    document.getElementById('table-content').innerHTML = `
      <table>
        <thead><tr>
          <th>제목·이름</th><th>내용</th><th>도시</th><th>연락처</th><th>상태</th><th>날짜</th><th>액션</th>
        </tr></thead>
        <tbody>
          ${data.map(r => `
            <tr data-id="${r.id}" data-table="community_items" data-db="main">
              <td><div class="cell-name">${esc(r.title || r.business_name || r.name || '(제목없음)')}</div>
                  <div style="font-size:.75rem;color:var(--muted)">${esc(r.category || r.type || '')}</div></td>
              <td><div class="cell-desc" title="${esc(r.description || r.content || '')}">${esc((r.description || r.content || '').slice(0, 60))}</div></td>
              <td><span class="cell-city">${esc(r.city_slug || r.city || '—')}</span></td>
              <td><div class="cell-contact">${esc(r.phone || r.contact || '—')}</div>
                  <div style="font-size:.75rem;color:var(--muted)">${esc(r.website || r.url || '')}</div></td>
              <td><span class="status ${r.status || 'community'}">${r.status === 'approved' ? '✅ 승인' : r.status === 'rejected' ? '❌ 거절' : '💬 커뮤니티'}</span></td>
              <td><div class="cell-date">${fmtDate(r.created_at)}</div></td>
              <td><div class="actions">
                ${r.status !== 'approved' ? `<button class="btn-sm btn-approve" onclick="updateStatus('${r.id}','community_items','main','approved')">✅ 승인</button>` : ''}
                ${r.status !== 'rejected' ? `<button class="btn-sm btn-reject" onclick="updateStatus('${r.id}','community_items','main','rejected')">❌ 거절</button>` : ''}
                <button class="btn-sm btn-delete" onclick="deleteRow('${r.id}','community_items','main')">🗑</button>
              </div></td>
            </tr>`).join('')}
        </tbody>
      </table>`
  }

  // ── 교회 렌더링 ──────────────────────────────────────────
  function renderChurches(data) {
    if (!data.length) { setEmpty('등록된 교회가 없습니다'); return }
    document.getElementById('count-badge').textContent = `${data.length}개`
    document.getElementById('table-content').innerHTML = `
      <table>
        <thead><tr>
          <th>교회명</th><th>설명</th><th>도시</th><th>Tier</th><th>상태</th><th>액션</th>
        </tr></thead>
        <tbody>
          ${data.map(r => `
            <tr>
              <td><div class="cell-name">${esc(r.name || '(이름없음)')}</div>
                  <div style="font-size:.75rem;color:var(--muted)">${esc(r.name_en || '')}</div></td>
              <td><div class="cell-desc">${esc((r.desc || r.description || '').slice(0, 60))}</div></td>
              <td><span class="cell-city">${esc(r.city_slug || r.city || '—')}</span></td>
              <td><span class="status ${r.tier === 1 ? 'approved' : 'community'}">Tier ${r.tier || '?'}</span></td>
              <td><span class="status ${r.active ? 'approved' : 'rejected'}">${r.active ? '✅ 활성' : '⏸ 비활성'}</span></td>
              <td><div class="actions">
                <button class="btn-sm btn-edit" onclick="editRow('${r.id}','churches')">✏️ 수정</button>
                <button class="btn-sm btn-delete" onclick="deleteRow('${r.id}','churches','main')">🗑</button>
              </div></td>
            </tr>`).join('')}
        </tbody>
      </table>`
  }

  // ── 파트너 목사 렌더링 ───────────────────────────────────
  function renderPartners(data) {
    if (!data.length) { setEmpty('파트너 목사가 없습니다'); return }
    document.getElementById('count-badge').textContent = `${data.length}명`
    document.getElementById('table-content').innerHTML = `
      <table>
        <thead><tr>
          <th>이름</th><th>이메일</th><th>교회</th><th>도시</th><th>Tier</th><th>인증</th><th>액션</th>
        </tr></thead>
        <tbody>
          ${data.map(r => `
            <tr>
              <td class="cell-name">${esc(r.name || '—')}</td>
              <td style="font-size:.82rem">${esc(r.email || '—')}</td>
              <td style="font-size:.82rem">${esc(r.church_name || '—')}</td>
              <td><span class="cell-city">${esc(r.city_slug || '—')}</span></td>
              <td><span class="status community">Tier ${r.tier || 1}</span></td>
              <td><span class="status ${r.verified ? 'approved' : 'pending'}">${r.verified ? '✅ 인증' : '⏳ 대기'}</span></td>
              <td><div class="actions">
                ${!r.verified ? `<button class="btn-sm btn-approve" onclick="verifyPartner('${r.id}')">✅ 인증</button>` : ''}
                <button class="btn-sm btn-delete" onclick="deleteRow('${r.id}','pastor_partners','new')">🗑</button>
              </div></td>
            </tr>`).join('')}
        </tbody>
      </table>`
  }

  // ── 식당·카페 렌더링 ─────────────────────────────────────
  function renderRestaurants(data) {
    if (!data.length) { setEmpty('등록된 식당·카페가 없습니다'); return }
    document.getElementById('count-badge').textContent = `${data.length}개`
    document.getElementById('table-content').innerHTML = `
      <table>
        <thead><tr>
          <th>이름</th><th>설명</th><th>도시</th><th>상태</th><th>액션</th>
        </tr></thead>
        <tbody>
          ${data.map(r => `
            <tr>
              <td class="cell-name">${esc(r.name || '—')}</td>
              <td><div class="cell-desc">${esc((r.desc || r.description || '').slice(0,60))}</div></td>
              <td><span class="cell-city">${esc(r.city_slug || r.city || '—')}</span></td>
              <td><span class="status ${r.active ? 'approved' : 'rejected'}">${r.active ? '✅ 활성' : '⏸ 비활성'}</span></td>
              <td><div class="actions">
                <button class="btn-sm btn-delete" onclick="deleteRow('${r.id}','restaurants','main')">🗑</button>
              </div></td>
            </tr>`).join('')}
        </tbody>
      </table>`
  }

  // ── 이야기 렌더링 ────────────────────────────────────────
  function renderStories(data) {
    if (!data.length) { setEmpty('등록된 이야기가 없습니다'); return }
    document.getElementById('count-badge').textContent = `${data.length}개`
    document.getElementById('table-content').innerHTML = `
      <table>
        <thead><tr>
          <th>제목</th><th>도시</th><th>파일</th><th>featured</th><th>날짜</th><th>액션</th>
        </tr></thead>
        <tbody>
          ${data.map(r => `
            <tr>
              <td class="cell-name">${esc(r.title_ko || '—')}</td>
              <td><span class="cell-city">${esc(r.city_slug || '—')}</span></td>
              <td><a href="${esc(r.html_file || '#')}" target="_blank" style="color:var(--mint);font-size:.8rem">${esc(r.slug || '—')}</a></td>
              <td><span class="status ${r.featured ? 'approved' : 'community'}">${r.featured ? '⭐ 피처드' : '일반'}</span></td>
              <td class="cell-date">${fmtDate(r.published_at || r.created_at)}</td>
              <td><div class="actions">
                ${!r.featured ? `<button class="btn-sm btn-approve" onclick="featureStory('${r.id}')">⭐ 피처드</button>` : ''}
                <button class="btn-sm btn-delete" onclick="deleteRow('${r.id}','stories','new')">🗑</button>
              </div></td>
            </tr>`).join('')}
        </tbody>
      </table>`
  }

  // ── AI 로그 렌더링 ───────────────────────────────────────
  function renderLogs(data) {
    if (!data.length) { setEmpty('AI 질의 로그가 없습니다'); return }
    document.getElementById('count-badge').textContent = `${data.length}건`
    document.getElementById('table-content').innerHTML = `
      <table>
        <thead><tr>
          <th>질문 (비식별)</th><th>도시</th><th>카테고리</th><th>Tier</th><th>언어</th><th>날짜</th>
        </tr></thead>
        <tbody>
          ${data.map(r => `
            <tr>
              <td style="max-width:260px;overflow:hidden;text-overflow:ellipsis">${esc((r.question||'').slice(0,80))}</td>
              <td><span class="cell-city">${esc(r.city_slug||'—')}</span></td>
              <td><span class="status community">${esc(r.category||'general')}</span></td>
              <td style="font-size:.82rem">T${r.tier||'?'}</td>
              <td style="font-size:.82rem">${r.lang||'ko'}</td>
              <td class="cell-date">${fmtDate(r.created_at)}</td>
            </tr>`).join('')}
        </tbody>
      </table>`
  }

  // ── 데이터 조작 ──────────────────────────────────────────
  async function updateStatus(id, table, db, status) {
    const sb = db === 'main' ? sbMain : sbNew
    const { error } = await sb.from(table).update({ status }).eq('id', id)
    if (error) { toast('❌ ' + error.message); return }
    toast(`✅ ${status === 'approved' ? '승인' : '거절'} 완료`)
    loadTabData(currentTab)
  }

  async function deleteRow(id, table, db) {
    if (!confirm('정말 삭제하시겠습니까?')) return
    const sb = db === 'main' ? sbMain : sbNew
    const { error } = await sb.from(table).delete().eq('id', id)
    if (error) { toast('❌ ' + error.message); return }
    toast('🗑️ 삭제 완료')
    loadTabData(currentTab)
  }

  async function verifyPartner(id) {
    const { error } = await sbNew.from('pastor_partners').update({ verified: true }).eq('id', id)
    if (error) { toast('❌ ' + error.message); return }
    toast('✅ 인증 완료')
    loadTabData('partners')
  }

  async function featureStory(id) {
    const { error } = await sbNew.from('stories').update({ featured: true }).eq('id', id)
    if (error) { toast('❌ ' + error.message); return }
    toast('⭐ 피처드 설정 완료')
    loadTabData('stories')
  }

  function editRow(id, table) {
    alert(`${table} ID: ${id}\n\n현재 직접 수정은 Supabase 대시보드에서:\nhttps://supabase.com/dashboard/project/okhfjzofifmsgssgajts/editor`)
  }

  // ── 검색·필터 ────────────────────────────────────────────
  function filterTable() {
    const q = document.getElementById('search').value.toLowerCase()
    const city = document.getElementById('city-filter').value
    const status = document.getElementById('status-filter').value

    const rows = document.querySelectorAll('tbody tr')
    let visible = 0
    rows.forEach(row => {
      const text = row.textContent.toLowerCase()
      const cityMatch = !city || text.includes(city)
      const statusMatch = !status || text.includes(status)
      const searchMatch = !q || text.includes(q)
      const show = cityMatch && statusMatch && searchMatch
      row.style.display = show ? '' : 'none'
      if (show) visible++
    })
    document.getElementById('count-badge').textContent = `${visible}개 표시`
  }

  // ── 통계 로드 ────────────────────────────────────────────
  async function loadStats() {
    const counts = [
      sbMain.from('community_items').select('id', { count: 'exact', head: true }),
      sbMain.from('churches').select('id', { count: 'exact', head: true }),
      sbMain.from('restaurants').select('id', { count: 'exact', head: true }),
      sbNew.from('pastor_partners').select('id', { count: 'exact', head: true }),
      sbNew.from('stories').select('id', { count: 'exact', head: true }),
    ]
    const results = await Promise.allSettled(counts)
    const ids = ['st-community','st-churches','st-restaurants','st-partners','st-stories']
    results.forEach((r, i) => {
      document.getElementById(ids[i]).textContent = r.status === 'fulfilled' ? (r.value.count ?? '?') : '?'
    })
  }

  // ── 유틸 ─────────────────────────────────────────────────
  function esc(s) { return String(s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;') }
  function fmtDate(d) { if (!d) return '—'; return new Date(d).toLocaleDateString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) }
  function setTableLoading() { document.getElementById('table-content').innerHTML = '<div class="loading"><span class="spinner"></span>로딩 중...</div>' }
  function setEmpty(msg) { document.getElementById('table-content').innerHTML = `<div class="empty"><div class="empty-icon">📭</div>${msg}</div>` }
  function toast(msg) {
    const el = document.getElementById('toast')
    el.textContent = msg
    el.classList.add('show')
    setTimeout(() => el.classList.remove('show'), 2500)
  }

  // ── 초기화 ───────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    // 세션 유효하면 바로 입장
    if (checkSession()) {
      initSB()
      showApp({ email: 'admin' })
    }
    // 엔터키 로그인
    document.getElementById('pw-input')?.addEventListener('keydown', e => {
      if (e.key === 'Enter') checkPassword()
    })
  })

  function showApp(user) {
    document.getElementById('login-gate').style.display = 'none'
    document.getElementById('app').style.display = 'block'
    document.getElementById('admin-email').textContent = user.email || ''
    loadStats()
    loadTabData('community')
  }
</script>
</body>
</html>
