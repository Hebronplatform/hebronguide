<style>
*{box-sizing:border-box;margin:0;padding:0;}
html{background:#0d1117;scroll-behavior:smooth;}
body{font-family:'Noto Sans KR',-apple-system,sans-serif;background:#0d1117;color:#ECFDF5;line-height:1.8;min-height:100vh;padding-bottom:72px;}

/* ── 스티키 액션바 (항상 하단 고정) ── */
.sticky-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:999;
  display:flex;gap:0;
  background:rgba(13,17,23,.97);
  backdrop-filter:blur(16px);
  border-top:1px solid rgba(255,255,255,.1);
  box-shadow:0 -4px 24px rgba(0,0,0,.5);
  padding:10px 12px;
  gap:8px;
}
.sticky-bar a, .sticky-bar button{
  flex:1;display:flex;align-items:center;justify-content:center;gap:6px;
  border-radius:12px;padding:12px 8px;
  font-family:'Noto Sans KR',sans-serif;font-weight:800;font-size:.82rem;
  text-decoration:none;cursor:pointer;border:none;
  transition:opacity .2s;
  white-space:nowrap;
}
.sticky-bar a:hover,.sticky-bar button:hover{opacity:.85;}
.sbar-primary{background:linear-gradient(135deg,#C9A227,#f0c040);color:#0d1117;}
.sbar-secondary{background:rgba(110,231,183,.12);border:1px solid rgba(110,231,183,.3)!important;color:#6EE7B7;}
.sbar-ghost{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12)!important;color:rgba(236,253,245,.65);}

/* ── 인라인 빠른 연결 (섹션 끝 미니 CTA) ── */
.quick-cta{
  display:flex;gap:8px;margin:16px 0 8px;flex-wrap:wrap;
}
.qbtn{
  display:inline-flex;align-items:center;gap:5px;
  font-family:'Noto Sans KR',sans-serif;font-size:.76rem;font-weight:700;
  border-radius:99px;padding:7px 16px;text-decoration:none;
  border:1px solid;transition:opacity .2s;
}
.qbtn:hover{opacity:.8;}
.qbtn-gold{color:#C9A227;border-color:rgba(201,162,39,.35);background:rgba(201,162,39,.08);}
.qbtn-mint{color:#6EE7B7;border-color:rgba(110,231,183,.3);background:rgba(110,231,183,.06);}
.qbtn-white{color:rgba(236,253,245,.65);border-color:rgba(255,255,255,.15);background:rgba(255,255,255,.04);}

@media print{
  body{background:#fff;color:#111;}
  header,footer{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .card{background:#f8f8f8!important;border:1px solid #ddd!important;}
  .no-print{display:none!important;}
  .lang-bar{display:none!important;}
}

/* ── 언어 토글 ── */
.lang-bar{
  position:sticky;top:0;z-index:200;
  display:flex;justify-content:flex-end;align-items:center;
  padding:10px 20px;gap:6px;
  background:rgba(13,17,23,.92);
  backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(255,255,255,.06);
}
.lang-btn{
  padding:6px 16px;border-radius:99px;font-size:.72rem;font-weight:800;
  font-family:'Noto Sans KR',sans-serif;cursor:pointer;
  border:1px solid rgba(255,255,255,.15);
  background:transparent;color:rgba(236,253,245,.4);
  transition:all .2s;letter-spacing:.04em;
}
.lang-btn.active{
  background:rgba(110,231,183,.15);
  border-color:rgba(110,231,183,.5);
  color:#6EE7B7;
}
.lang-btn:hover:not(.active){color:rgba(236,253,245,.7);border-color:rgba(255,255,255,.3);}

header{
  background:linear-gradient(160deg,#1a2535 0%,#0d1117 100%);
  border-bottom:1px solid rgba(255,255,255,0.07);
  padding:40px 24px 36px;
  text-align:center;
}
.priv-badge{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);
  border-radius:99px;padding:5px 18px;
  font-size:.7rem;font-weight:800;color:#fca5a5;letter-spacing:.07em;
  margin-bottom:18px;
}
header h1{
  font-family:'Noto Serif KR',serif;
  font-size:1.75rem;font-weight:700;line-height:1.35;
  color:#fff;margin-bottom:10px;
}
header h1 em{color:#6EE7B7;font-style:normal;}
header .lead{
  font-size:.88rem;color:rgba(236,253,245,.55);line-height:2;
  max-width:480px;margin:0 auto;
}
.container{max-width:620px;margin:0 auto;padding:36px 20px 100px;}
.sec{margin:44px 0 18px;}
.sec-label{font-size:.68rem;font-weight:800;color:#6EE7B7;letter-spacing:.12em;margin-bottom:8px;}
.sec h2{font-family:'Noto Serif KR',serif;font-size:1.2rem;font-weight:700;color:#fff;line-height:1.4;}
.card{

  border-radius:16px;padding:22px 24px;margin-bottom:14px;
  position:relative;overflow:hidden;
}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;}
.card.green::before{background:linear-gradient(180deg,#6EE7B7,#34d399);}
.card.gold::before{background:linear-gradient(180deg,#C9A227,#b8901c);}
.card.purple::before{background:linear-gradient(180deg,#a78bfa,#7c3aed);}
.card.blue::before{background:linear-gradient(180deg,#60a5fa,#2563eb);}
.card-title{font-size:.95rem;font-weight:800;color:#fff;margin-bottom:7px;}
.card-body{font-size:.84rem;color:rgba(236,253,245,.68);line-height:1.9;}
.card-body strong{color:#ECFDF5;font-weight:700;}
.card-body em{color:#6EE7B7;font-style:normal;font-weight:700;}
.mindshift{
  background:linear-gradient(135deg,rgba(110,231,183,.08),rgba(201,162,39,.06));
  border:1px solid rgba(110,231,183,.2);border-radius:16px;padding:22px 24px;margin:20px 0;
}
.mindshift .q{font-family:'Noto Serif KR',serif;font-size:1rem;font-weight:700;color:#6EE7B7;margin-bottom:6px;line-height:1.5;}
.mindshift .a{font-size:.85rem;color:rgba(236,253,245,.75);line-height:1.9;}
.steps{display:flex;flex-direction:column;gap:14px;}
.step{display:flex;gap:16px;align-items:flex-start;}
.step-num{
  min-width:32px;height:32px;border-radius:50%;
  background:linear-gradient(135deg,#1a2535,#273444);
  border:1.5px solid rgba(110,231,183,.35);
  color:#6EE7B7;font-weight:900;font-size:.85rem;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.step-title{font-size:.9rem;font-weight:800;color:#fff;margin-bottom:3px;}
.step-desc{font-size:.82rem;color:rgba(236,253,245,.6);line-height:1.75;}
.biz-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0;}
.biz-item{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:12px 14px;}
.biz-emoji{font-size:1.4rem;margin-bottom:4px;}
.biz-name{font-size:.82rem;font-weight:700;color:#fff;margin-bottom:2px;}
.biz-desc{font-size:.72rem;color:rgba(236,253,245,.5);line-height:1.5;}
.verse-box{
  background:rgba(201,162,39,.07);border:1px solid rgba(201,162,39,.2);
  border-radius:14px;padding:18px 22px;margin:20px 0;text-align:center;
}
.verse-text{font-family:'Noto Serif KR',serif;font-size:.92rem;color:rgba(236,253,245,.85);line-height:1.85;font-style:italic;margin-bottom:8px;}
.verse-ref{font-size:.75rem;color:#C9A227;font-weight:700;}
.covenant{
  background:linear-gradient(135deg,rgba(201,162,39,.1),rgba(110,231,183,.06));

.covenant h3{font-family:'Noto Serif KR',serif;font-size:1rem;font-weight:700;color:#C9A227;margin-bottom:14px;}
.covenant ul{list-style:none;display:flex;flex-direction:column;gap:10px;}
.covenant li{display:flex;align-items:flex-start;gap:10px;font-size:.85rem;color:rgba(236,253,245,.75);line-height:1.75;}
.covenant li::before{content:'✦';color:#C9A227;flex-shrink:0;margin-top:2px;font-size:.75rem;}
.contact{
  background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);
  border-radius:14px;padding:18px 20px;display:flex;align-items:center;gap:16px;text-decoration:none;

.contact-icon{font-size:2rem;flex-shrink:0;}
.contact-label{font-size:.72rem;color:rgba(236,253,245,.35);margin-bottom:2px;}
.contact-value{font-size:.95rem;font-weight:800;color:#6EE7B7;}
footer{

.info-box{

  border-radius:12px;padding:14px 18px;margin-bottom:18px;
  font-size:.82rem;color:rgba(236,253,245,.7);line-height:1.9;

</style>

  });

  // 버튼 상태
  document.getElementById('btn-ko').classList.toggle('active', lang === 'ko');
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');

  // title
  document.title = lang === 'ko'
    ? '성도와 함께하는 VIP 환대 — 헤브론 파트너 교회 협력 문서'
    : 'VIP Hospitality Collaboration — Hebron Partner Church Document';
}

// 페이지 로드 시 적용
document.addEventListener('DOMContentLoaded', () => setLang(currentLang));

// CTA 버튼 (data-ko/en으로 처리됨) — 이미 setLang에서 자동 처리됨
// QR 저장 편의 함수
function downloadQR(type) {
  var urls = {
    register: 'https://api.qrserver.com/v1/create-qr-code/?size=600x600&data=https%3A%2F%2Fhebronguide.com%2Fad-request.html&color=0d1117&bgcolor=ffffff&margin=12',
    main:     'https://api.qrserver.com/v1/create-qr-code/?size=600x600&data=https%3A%2F%2Fhebronguide.com&color=0d1117&bgcolor=ffffff&margin=12'
  };
  var a = document.createElement('a');
  a.href = urls[type];
  a.download = 'hebronguide-' + type + '-qr.png';
  a.target = '_blank';
  a.click();
}
</script>
