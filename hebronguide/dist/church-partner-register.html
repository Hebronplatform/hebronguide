<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>파트너 교회 신청 — HebronGuide</title>
<meta name="description" content="HebronGuide 파트너 교회 등록 신청. 협력교회로 등재하면 도시 페이지 최상단에 교회 정보가 풍부하게 노출됩니다.">
<meta name="robots" content="noindex">
<style>
  :root{ --bg:#0a0e14; --bg2:#0d1117; --card:#161d29; --line:rgba(255,255,255,.1); --gold:#C9A227; --mint:#6EE7B7; --text:#e8edf4; --muted:#8b93a1; }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'Noto Sans KR','Apple SD Gothic Neo',-apple-system,sans-serif;line-height:1.6;}
  .wrap{max-width:640px;margin:0 auto;padding:32px 18px 64px;}
  .logo{font-family:'Cinzel',serif;font-weight:900;color:var(--gold);font-size:1.05rem;letter-spacing:.02em;text-decoration:none;}
  h1{font-size:1.5rem;margin:20px 0 6px;}
  .sub{color:var(--muted);font-size:.9rem;margin-bottom:8px;}
  .partner-note{background:rgba(201,162,39,.08);border:1px solid rgba(201,162,39,.28);border-radius:12px;padding:12px 14px;font-size:.82rem;color:#e4d9b8;margin:14px 0 24px;}
  form{display:flex;flex-direction:column;gap:16px;}
  .row{display:flex;gap:12px;flex-wrap:wrap;}
  .row>.field{flex:1;min-width:180px;}
  .field label{display:block;font-size:.8rem;color:var(--muted);margin-bottom:6px;}
  .field label .req{color:var(--gold);}
  input,select,textarea{width:100%;background:var(--bg2);border:1px solid var(--line);border-radius:10px;color:var(--text);padding:11px 13px;font-size:.9rem;font-family:inherit;transition:border-color .15s;}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold);}
  input::placeholder,textarea::placeholder{color:#5b6472;}
  textarea{resize:vertical;min-height:64px;}
  .check{display:flex;align-items:flex-start;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;cursor:pointer;}
  .check input{width:20px;height:20px;flex:none;margin-top:1px;accent-color:var(--gold);}
  .check.partner{border-color:rgba(201,162,39,.45);background:rgba(201,162,39,.06);}
  .check .ct{font-size:.9rem;font-weight:700;}
  .check .cs{font-size:.76rem;color:var(--muted);font-weight:400;}
  button.submit{margin-top:8px;background:linear-gradient(135deg,var(--gold),#f0c040);color:#1a1200;border:none;border-radius:12px;padding:15px;font-size:1rem;font-weight:800;cursor:pointer;font-family:inherit;transition:opacity .15s;}
  button.submit:disabled{opacity:.55;cursor:default;}
  #thanks{display:none;text-align:center;padding:40px 16px;}
  #thanks .big{font-size:2.4rem;}
  #thanks h2{color:var(--mint);margin:12px 0 8px;}
  .foot{margin-top:28px;font-size:.72rem;color:var(--muted);text-align:center;line-height:1.8;}
  .foot a{color:var(--gold);text-decoration:none;}
</style>
</head>
<body>
<div class="wrap">
  <a class="logo" href="/">✦ HebronGuide</a>
  <h1>파트너 교회 신청</h1>
  <p class="sub">그 도시에 살아본 성도를 섬기는 교회를 등재합니다. 아래 정보가 풍부할수록 카드가 풍성해집니다.</p>
  <div class="partner-note">🤝 <b>Hebron 협력교회</b>로 신청하면, 확인 후 <b>도시 페이지 최상단</b>에 담임목사·주소·예배시간·특징과 함께 크게 노출됩니다 (시애틀지구촌교회처럼).</div>

  <form id="pform" onsubmit="submitPartner(event)">
    <div class="row">
      <div class="field"><label>교회명 (한글) <span class="req">*</span></label><input id="f_nameKo" required placeholder="예: 시애틀지구촌교회"/></div>
      <div class="field"><label>교회명 (영문)</label><input id="f_nameEn" placeholder="e.g., Seattle Global Community Church"/></div>
    </div>
    <div class="row">
      <div class="field"><label>담임목사 (한글)</label><input id="f_pastorKo" placeholder="예: 김성수 목사"/></div>
      <div class="field"><label>담임목사 (영문)</label><input id="f_pastorEn" placeholder="e.g., Sung Soo Kim"/></div>
    </div>
    <div class="row">
      <div class="field"><label>도시 <span class="req">*</span></label><select id="f_city" required><option value="">불러오는 중…</option></select></div>
      <div class="field"><label>교단</label><input id="f_denom" placeholder="예: 침례회 / 순복음 / 장로교"/></div>
    </div>
    <div class="field"><label>주소</label><input id="f_address" placeholder="예: 4900 168th St. SW., Lynnwood, WA 98037"/></div>
    <div class="row">
      <div class="field"><label>예배시간</label><input id="f_service" placeholder="예: 주일 1:00pm · 토요새벽 6:00am"/></div>
      <div class="field"><label>홈페이지</label><input id="f_website" placeholder="예: ijiguchon.org"/></div>
    </div>
    <div class="row">
      <div class="field"><label>전화</label><input id="f_phone" placeholder="예: 425-000-0000"/></div>
      <div class="field"><label>이메일</label><input id="f_email" type="email" placeholder="pastor@church.org"/></div>
    </div>
    <div class="field"><label>특징 (쉼표로 구분)</label><input id="f_features" placeholder="예: 정착도움, 가정교회, 한미가족, 시니어 환영, 영어회중"/></div>

    <label class="check"><input type="checkbox" id="f_hcmi"/><span><span class="ct">가정교회(HCMI)입니다</span><br><span class="cs">가정교회 사역 중인 경우 체크</span></span></label>
    <label class="check partner"><input type="checkbox" id="f_partner"/><span><span class="ct">🤝 Hebron 협력교회로 신청합니다</span><br><span class="cs">체크 시 협력교회 신청으로 접수 → 목사님 확인 후 최상단 협력교회 카드로 등재됩니다</span></span></label>

    <div class="field"><label>남기실 말씀 (선택)</label><textarea id="f_note" placeholder="사역 소개, 요청사항 등 자유롭게"></textarea></div>

    <button type="submit" class="submit">신청 보내기 →</button>
  </form>

  <div id="thanks">
    <div class="big">🙏</div>
    <h2 id="thanksTitle">신청이 접수되었습니다</h2>
    <p class="sub" id="thanksMsg">확인 후 등재해 드립니다. 감사합니다.</p>
    <a class="logo" href="/">← HebronGuide 홈으로</a>
  </div>

  <div class="foot">HebronGuide · Hebron Platform LLC · <a href="mailto:hebronplatform@gmail.com">hebronplatform@gmail.com</a></div>
</div>

<script>
// 도시 드롭다운 — cities.json에서 자동 (도시 추가 시 자동 최신)
fetch('/cities.json').then(function(r){return r.json();}).then(function(cities){
  var sel = document.getElementById('f_city');
  sel.innerHTML = '<option value="">도시를 선택하세요</option>';
  cities.forEach(function(c){
    var o = document.createElement('option');
    o.value = c.slug; o.textContent = c.nameKo + (c.nameEn && c.nameEn !== c.nameKo ? ' · ' + c.nameEn : '');
    sel.appendChild(o);
  });
}).catch(function(){ document.getElementById('f_city').innerHTML = '<option value="">도시 목록을 불러오지 못했습니다 — 직접 입력해 주세요</option>'; });

function val(id){ return (document.getElementById(id).value || '').trim(); }

function submitPartner(e){
  e.preventDefault();
  var btn = e.target.querySelector('button.submit');
  var label = btn.textContent;
  btn.disabled = true; btn.textContent = '보내는 중…';
  function reset(){ btn.disabled = false; btn.textContent = label; }

  fetch('/api/register-partner-church', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      nameKo: val('f_nameKo'), nameEn: val('f_nameEn'),
      pastorKo: val('f_pastorKo'), pastorEn: val('f_pastorEn'),
      city_slug: val('f_city'),
      denomination: val('f_denom'), address: val('f_address'),
      serviceTime: val('f_service'), website: val('f_website'),
      phone: val('f_phone'), email: val('f_email'),
      features: val('f_features'), note: val('f_note'),
      hcmi: document.getElementById('f_hcmi').checked,
      requestPartner: document.getElementById('f_partner').checked,
    }),
  })
  .then(function(r){ return r.json().catch(function(){ return {}; }); })
  .then(function(d){
    if (d && d.status === 'rejected') { alert(d.message || '등재가 어렵습니다.'); reset(); return; }
    if (d && (d.status === 'pending' || d.saved)) {
      if (document.getElementById('f_partner').checked) document.getElementById('thanksTitle').textContent = '협력교회 신청이 접수되었습니다';
      if (d.message) document.getElementById('thanksMsg').textContent = d.message;
      document.getElementById('pform').style.display = 'none';
      document.getElementById('thanks').style.display = 'block';
      document.getElementById('thanks').scrollIntoView({ behavior: 'smooth' });
    } else { alert((d && d.error) || '제출에 문제가 있었습니다. 잠시 후 다시 시도해 주세요.'); reset(); }
  })
  .catch(function(){ alert('네트워크 오류입니다. 잠시 후 다시 시도해 주세요.'); reset(); });
}
</script>
</body>
</html>
