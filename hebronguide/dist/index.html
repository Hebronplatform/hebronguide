  <!-- ── 자동 복구 스크립트 — React 실행 전 실행, 크래시 감지 시 자동 업데이트 ── -->
  <script>
  (function() {
    // 1. SW 업데이트 즉시 트리거 (React 실행 전)
    if ('serviceWorker' in navigator) {
      var refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', function() {
        if (refreshing) return;
        refreshing = true;
        window.location.reload();
      });
      navigator.serviceWorker.getRegistration().then(function(reg) {
        if (!reg) return;
        if (reg.waiting) { reg.waiting.postMessage({ type: 'SKIP_WAITING' }); return; }
        reg.update().catch(function(){});
        reg.addEventListener('updatefound', function() {
          var w = reg.installing;
          if (!w) return;
          w.addEventListener('statechange', function() {
            if (w.state === 'installed') w.postMessage({ type: 'SKIP_WAITING' });
          });
        });
      }).catch(function(){});
    }

    // 2. 전역 오류 감지 — "X is not defined" 오류 시 친절한 업데이트 화면 표시
    window.addEventListener('error', function(e) {
      if (!e.message || !e.message.includes('is not defined')) return;
      // 이미 복구 화면이 있으면 중복 방지
      if (document.getElementById('hg-recovery')) return;

      var el = document.createElement('div');
      el.id = 'hg-recovery';
      el.style.cssText = [
        'position:fixed;inset:0;z-index:99999;background:#0d1117',
        'display:flex;flex-direction:column;align-items:center;justify-content:center',
        'font-family:Manrope,-apple-system,sans-serif;text-align:center;padding:32px'
      ].join(';');
      el.innerHTML = [
        '<div style="font-size:52px;margin-bottom:20px">🔄</div>',
        '<div style="font-size:20px;font-weight:900;color:#6EE7B7;margin-bottom:10px">최신 버전으로 업데이트 중</div>',
        '<div style="font-size:14px;color:rgba(236,253,245,0.7);margin-bottom:24px;line-height:1.6">',
        '잠깐 기다려 주세요.<br>자동으로 새로 고쳐집니다.</div>',
        '<div style="width:48px;height:48px;border:4px solid rgba(110,231,183,0.2);',
        'border-top-color:#6EE7B7;border-radius:50%;animation:spin 1s linear infinite"></div>',
        '<style>@keyframes spin{to{transform:rotate(360deg)}}</style>'
      ].join('');
      document.body.appendChild(el);

      // 3초 후 강제 새로고침
      setTimeout(function() { window.location.reload(true); }, 3000);
    });
  })();
  </script>
