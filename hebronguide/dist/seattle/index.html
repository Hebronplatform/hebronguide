<style>
/* ═══ RESET & BASE ═══ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Noto Sans KR', system-ui, sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  transition: background 1.2s ease, color 0.6s ease;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* ═══ WEATHER-REACTIVE CSS VARS ═══ */
:root {
  --bg:        #f5f0e8;
  --bg2:       #faf7f2;
  --card:      rgba(255,255,255,0.82);
  --ink:       #1a1a14;
  --ink-soft:  #3a3a2e;
  --ink-mute:  #7a7a6a;
  --ink-faint: #b5b5a0;
  --rule:      rgba(0,0,0,0.08);
  --gold:      #c9a227;
  --mint:      #2d9e6b;
  --sky-top:   #7ec8e3;
  --sky-bot:   #eee8d5;
  --glow:      rgba(201,162,39,0.35);
  --shadow:    0 8px 32px rgba(0,0,0,0.10);
}
.mood-rain    { --bg:#e2e0db; --bg2:#e8e6e0; --sky-top:#6a7e8c; --sky-bot:#d0cec8; --glow:rgba(100,140,160,0.3); }
.mood-drizzle { --bg:#e8e4de; --bg2:#ede9e2; --sky-top:#8899a8; --sky-bot:#d4d0c8; --glow:rgba(110,150,170,0.3); }
.mood-fog     { --bg:#eae6e0; --bg2:#eeeae4; --sky-top:#a8b0b8; --sky-bot:#dcd8d0; --glow:rgba(130,140,150,0.3); }
.mood-cloudy  { --bg:#ece8e0; --bg2:#f0ece4; --sky-top:#a0b4c0; --sky-bot:#ddd8cf; --glow:rgba(140,160,170,0.3); }
.mood-clear   { --bg:#f5f0e8; --bg2:#faf7f2; --sky-top:#5ab4d8; --sky-bot:#eee8d5; --glow:rgba(201,162,39,0.35); }

/* ═══ CANVAS (particles behind everything) ═══ */
#particle-canvas {
  position: fixed; inset: 0; z-index: 0;
  pointer-events: none; opacity: 0.65;
}

/* ═══ NAV ═══ */
.nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(245,240,232,0.88);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--rule);
  padding: env(safe-area-inset-top, 0) 0 0;
}
.nav-inner {
  max-width: 900px; margin: 0 auto;
  padding: 12px 20px;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.brand { display: flex; align-items: baseline; gap: 6px; text-decoration: none; }
.brand-name {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 20px; font-weight: 500; letter-spacing: -0.3px;
  color: var(--ink);
}
.brand-name em { font-style: italic; font-weight: 300; color: var(--gold); }
.brand-city {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: var(--ink-mute); letter-spacing: 0.5px;
}
.nav-actions { display: flex; align-items: center; gap: 10px; }
.btn-install {
  font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.5px;
  color: var(--gold); background: rgba(201,162,39,0.1);
  border: 1px solid rgba(201,162,39,0.3); border-radius: 20px;
  padding: 5px 12px; cursor: pointer; transition: all .2s;
}
.btn-install:hover { background: rgba(201,162,39,0.2); }
.lang-btn {
  font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 500;
  color: var(--ink-mute); background: var(--card);
  border: 1px solid var(--rule); border-radius: 20px;
  padding: 5px 12px; cursor: pointer; transition: all .2s;
}
.lang-btn:hover { color: var(--ink); }
.back-link {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  color: var(--ink-faint); text-decoration: none; letter-spacing: 0.3px;
  transition: color .2s;
}
.back-link:hover { color: var(--gold); }

/* ═══ LIVE STRIP ═══ */
.live-strip {
  max-width: 900px; margin: 0 auto;
  padding: 8px 20px;
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  font-family: 'JetBrains Mono', monospace; font-size: 10.5px; letter-spacing: 0.5px;
  color: var(--ink-mute);
  border-bottom: 1px solid var(--rule);
}
.live-dot {
  width: 7px; height: 7px; border-radius: 50%; background: #10b981;
  display: inline-block; margin-right: 5px;
  animation: blink 2.4s ease-in-out infinite;
}
@keyframes blink {
  0%,100% { opacity:.4; transform:scale(1); }
  50%      { opacity:1;  transform:scale(1.35); }
}
.strip-sep { color: var(--ink-faint); }

/* ═══ HERO ═══ */
.hero {
  position: relative; z-index: 1;
  min-height: 100svh;
  display: flex; flex-direction: column; justify-content: center;
  padding: 60px 20px 80px;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute; inset: 0; z-index: -1;
  background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-bot) 55%, var(--bg) 100%);
  transition: all 1.2s ease;
}
.hero-inner { max-width: 900px; margin: 0 auto; width: 100%; }
.hero-eyebrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase;
  color: var(--ink-mute); margin-bottom: 20px;
}
.hero-title {
  font-family: 'Fraunces', Georgia, serif;
  font-size: clamp(44px, 9vw, 96px);
  font-weight: 400; line-height: 1.0; letter-spacing: -2.5px;
  color: var(--ink); margin-bottom: 16px;
  text-wrap: balance;
}
.hero-title em { font-style: italic; color: var(--gold); }
.hero-sub {
  font-size: 17px; line-height: 1.7; color: var(--ink-soft);
  max-width: 520px; margin-bottom: 48px;
}

/* ═══ VOICE AI BOX ═══ */
.voice-box {
  background: var(--card);
  border: 1px solid var(--rule);
  border-radius: 28px;
  padding: 28px;
  box-shadow: var(--shadow);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  max-width: 640px;
}
.voice-label {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  letter-spacing: 2px; text-transform: uppercase;
  color: var(--ink-mute); margin-bottom: 18px;
}
.voice-row {
  display: flex; gap: 12px; align-items: flex-end;
}
.mic-btn {
  flex-shrink: 0;
  width: 62px; height: 62px; border-radius: 50%;
  background: linear-gradient(135deg, var(--gold) 0%, #e8b830 100%);
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 0 0 var(--glow);
  transition: transform .15s, box-shadow .15s;
  position: relative;
}
.mic-btn:hover { transform: scale(1.07); }
.mic-btn:active { transform: scale(0.95); }
.mic-btn.listening {
  animation: mic-pulse 1.2s ease-in-out infinite;
  background: linear-gradient(135deg, #e85555 0%, #c93333 100%);
  box-shadow: 0 0 0 8px rgba(232,85,85,0.2);
}
@keyframes mic-pulse {
  0%,100% { box-shadow: 0 0 0 4px rgba(232,85,85,0.25); }
  50%      { box-shadow: 0 0 0 16px rgba(232,85,85,0.08); }
}
.mic-icon { font-size: 26px; }
.input-area { flex: 1; display: flex; flex-direction: column; gap: 8px; }
.voice-input {
  width: 100%; padding: 14px 18px;
  background: var(--bg2); border: 1.5px solid var(--rule);
  border-radius: 16px; font-size: 15px; font-family: 'Noto Sans KR', sans-serif;
  color: var(--ink); outline: none; resize: none;
  transition: border-color .2s;
  min-height: 54px; max-height: 120px;
}
.voice-input:focus { border-color: var(--gold); }
.voice-input::placeholder { color: var(--ink-faint); }
.send-btn {
  align-self: flex-end;
  background: var(--ink); color: var(--bg);
  border: none; border-radius: 12px; padding: 10px 20px;
  font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all .2s;
}
.send-btn:hover { background: var(--gold); color: #fff; }
.send-btn:disabled { opacity: .45; cursor: not-allowed; }

/* ═══ SUGGESTED PROMPTS ═══ */
.prompts {
  display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px;
}
.prompt-chip {
  font-family: 'Noto Sans KR', sans-serif; font-size: 12px;
  color: var(--ink-soft); background: var(--bg2);
  border: 1px solid var(--rule); border-radius: 20px;
  padding: 6px 14px; cursor: pointer;
  transition: all .2s; white-space: nowrap;
}
.prompt-chip:hover { background: var(--card); border-color: var(--gold); color: var(--ink); }

/* ═══ AI MESSAGES ═══ */
.ai-messages { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
.msg {
  padding: 12px 16px; border-radius: 16px;
  font-size: 14px; line-height: 1.65;
  animation: fadeUp .3s ease;
}
@keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
.msg-user {
  background: var(--ink); color: var(--bg2);
  align-self: flex-end; max-width: 80%;
  border-bottom-right-radius: 4px;
}
.msg-ai {
  background: rgba(201,162,39,0.09);
  border: 1px solid rgba(201,162,39,0.2);
  color: var(--ink); align-self: flex-start; max-width: 90%;
  border-bottom-left-radius: 4px;
  font-family: 'Noto Sans KR', sans-serif;
}
.msg-loading { display: flex; gap: 5px; align-items: center; padding: 14px 18px; }
.dot-bounce {
  width: 8px; height: 8px; border-radius: 50%; background: var(--gold);
  animation: bounce 1.2s ease-in-out infinite;
}
.dot-bounce:nth-child(2) { animation-delay: .2s; }
.dot-bounce:nth-child(3) { animation-delay: .4s; }
@keyframes bounce {
  0%,80%,100% { transform:translateY(0); opacity:.5; }
  40%          { transform:translateY(-6px); opacity:1; }
}

/* ═══ SECTION LAYOUT ═══ */
.section { position: relative; z-index: 1; padding: 48px 20px; }
.section + .section { border-top: 1px solid var(--rule); }
.section-inner { max-width: 900px; margin: 0 auto; }
.section-label {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  letter-spacing: 2.5px; text-transform: uppercase;
  color: var(--ink-faint); margin-bottom: 22px;
}
.section-title {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 32px; font-weight: 400; letter-spacing: -0.8px;
  color: var(--ink); margin-bottom: 24px;
}

/* ═══ TODAY CARDS ═══ */
.today-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}
@media (min-width: 600px) { .today-grid { grid-template-columns: repeat(4, 1fr); } }
.today-card {
  background: var(--card); border: 1px solid var(--rule); border-radius: 20px;
  padding: 18px 16px;
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  transition: transform .2s, box-shadow .2s;
}
.today-card:hover { transform: translateY(-3px); box-shadow: var(--shadow); }
.card-label {
  font-family: 'JetBrains Mono', monospace; font-size: 9.5px;
  letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--ink-faint); margin-bottom: 10px;
}
.card-value {
  font-family: 'Fraunces', serif; font-size: 28px; font-weight: 500;
  letter-spacing: -1px; color: var(--ink); line-height: 1;
}
.card-sub {
  font-size: 11.5px; color: var(--ink-mute); margin-top: 5px;
  line-height: 1.4;
}
.card-emoji { font-size: 22px; margin-bottom: 8px; }
.badge-live2 {
  display: inline-flex; align-items: center; gap: 4px;
  font-family: 'JetBrains Mono', monospace; font-size: 9px;
  letter-spacing: .5px; color: #10b981;
  background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.25);
  border-radius: 20px; padding: 2px 8px; margin-top: 6px;
}

/* ═══ SEGMENT CHOOSER ═══ */
.segments { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
.seg-btn {
  font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 600;
  padding: 8px 18px; border-radius: 20px; border: 1.5px solid var(--rule);
  background: var(--card); color: var(--ink-mute); cursor: pointer;
  transition: all .2s;
}
.seg-btn.active {
  background: var(--ink); color: var(--bg);
  border-color: var(--ink);
}
.seg-btn:hover:not(.active) { border-color: var(--gold); color: var(--ink); }

/* ═══ CHECKLIST ═══ */
.checklist { display: flex; flex-direction: column; gap: 2px; }
.check-item {
  display: flex; align-items: flex-start; gap: 14px;
  padding: 14px 0; border-bottom: 1px solid var(--rule); cursor: pointer;
}
.check-item:last-child { border-bottom: none; }
.check-box {
  flex-shrink: 0; width: 22px; height: 22px; border-radius: 6px;
  border: 1.5px solid var(--ink-faint); background: transparent;
  display: flex; align-items: center; justify-content: center;
  margin-top: 1px; transition: all .2s;
}
.check-box.done { background: var(--mint); border-color: var(--mint); }
.check-num {
  font-family: 'Fraunces', serif; font-style: italic;
  font-size: 18px; color: var(--ink-faint); flex-shrink: 0; width: 24px;
}
.check-text { flex: 1; }
.check-title {
  font-size: 14.5px; font-weight: 600; color: var(--ink); line-height: 1.4;
}
.check-desc { font-size: 12.5px; color: var(--ink-mute); margin-top: 3px; line-height: 1.55; }
.check-item.done .check-title { text-decoration: line-through; color: var(--ink-faint); }

/* ═══ QUICK GUIDE ═══ */
.guide-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
}
@media (max-width: 480px) { .guide-grid { grid-template-columns: repeat(4, 1fr); } }
.guide-card {
  background: var(--card); border: 1px solid var(--rule); border-radius: 16px;
  padding: 16px 12px; text-align: center; text-decoration: none;
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  transition: all .2s; color: inherit;
}
.guide-card:hover { transform: translateY(-3px); box-shadow: var(--shadow); border-color: var(--gold); }
.guide-emoji { font-size: 24px; }
.guide-name { font-size: 11.5px; font-weight: 600; color: var(--ink-soft); }

/* ═══ COMMUNITY STRIP ═══ */
.community-scroll {
  display: flex; gap: 12px; overflow-x: auto; padding-bottom: 8px;
  scrollbar-width: none;
}
.community-scroll::-webkit-scrollbar { display: none; }
.community-card {
  flex-shrink: 0; width: 260px;
  background: var(--card); border: 1px solid var(--rule); border-radius: 18px;
  padding: 16px 18px;
}
.comm-kind {
  font-family: 'JetBrains Mono', monospace; font-size: 9.5px;
  letter-spacing: 1.5px; text-transform: uppercase;
  padding: 3px 9px; border-radius: 20px; margin-bottom: 10px;
  display: inline-block;
}
.kind-arrival  { background:rgba(201,162,39,.12); color:var(--gold); }
.kind-tip      { background:rgba(45,158,107,.12); color:var(--mint); }
.kind-update   { background:rgba(100,130,200,.12); color:#6482c8; }
.kind-question { background:rgba(180,100,180,.12); color:#b464b4; }
.comm-name { font-weight: 700; font-size: 12px; color: var(--ink); margin-bottom: 4px; }
.comm-msg { font-size: 12.5px; color: var(--ink-soft); line-height: 1.55; }
.comm-time { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--ink-faint); margin-top: 8px; }

/* ═══ FOOTER ═══ */
footer {
  position: relative; z-index: 1;
  border-top: 1px solid var(--rule); padding: 24px 20px;
  padding-bottom: calc(24px + env(safe-area-inset-bottom, 0));
}
.footer-inner {
  max-width: 900px; margin: 0 auto;
  display: flex; justify-content: space-between; align-items: center;
  flex-wrap: wrap; gap: 10px;
}
.footer-brand {
  font-family: 'Fraunces', serif; font-size: 15px; color: var(--ink-mute);
}
.footer-brand em { font-style: italic; color: var(--gold); }
.footer-links {
  display: flex; gap: 16px;
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  letter-spacing: .4px; color: var(--ink-faint);
}
.footer-links a { color: inherit; text-decoration: none; transition: color .15s; }
.footer-links a:hover { color: var(--gold); }

/* ═══ MISC ═══ */
.divider {
  max-width: 900px; margin: 0 auto;
  height: 1px; background: linear-gradient(90deg, transparent, var(--rule), transparent);
}
</style>
</head>

<body>
<canvas id="particle-canvas"></canvas>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback } = React;

/* ══════════════════════════════════════
   WEATHER CODE → MOOD
══════════════════════════════════════ */
function getWeatherMood(code) {
  if (code === 0 || code === 1) return { name:'clear',   emoji:'☀️',  ko:'맑음',     en:'Clear',     cssClass:'mood-clear'   };
  if (code <= 3)                return { name:'cloudy',  emoji:'⛅',  ko:'구름 조금', en:'Partly cloudy', cssClass:'mood-cloudy'  };
  if (code <= 49)               return { name:'fog',     emoji:'🌫️', ko:'안개',      en:'Foggy',     cssClass:'mood-fog'     };
  if (code <= 57)               return { name:'drizzle', emoji:'🌦️', ko:'이슬비',    en:'Drizzle',   cssClass:'mood-drizzle' };
  if (code <= 82)               return { name:'rain',    emoji:'🌧️', ko:'비',        en:'Rain',      cssClass:'mood-rain'    };
  return { name:'cloudy', emoji:'☁️', ko:'흐림', en:'Overcast', cssClass:'mood-cloudy' };
}

/* ══════════════════════════════════════
   HOOKS
══════════════════════════════════════ */
function useWeather() {
  const [data, setData] = useState(null);
  useEffect(() => {
    fetch('https://api.open-meteo.com/v1/forecast?latitude=47.6062&longitude=-122.3321&current=temperature_2m,weathercode,windspeed_10m,precipitation&temperature_unit=fahrenheit&timezone=America%2FLos_Angeles')
      .then(r => r.json())
      .then(d => setData(d.current))
      .catch(() => {});
    const id = setInterval(() => {
      fetch('https://api.open-meteo.com/v1/forecast?latitude=47.6062&longitude=-122.3321&current=temperature_2m,weathercode,windspeed_10m&temperature_unit=fahrenheit&timezone=America%2FLos_Angeles')
        .then(r => r.json()).then(d => setData(d.current)).catch(() => {});
    }, 10 * 60 * 1000);
    return () => clearInterval(id);
  }, []);
  return data;
}

function useExchangeRate() {
  const [rate, setRate] = useState(null);
  useEffect(() => {
    fetch('https://api.frankfurter.app/latest?from=USD&to=KRW')
      .then(r => r.json())
      .then(d => setRate(Math.round(d.rates.KRW)))
      .catch(() => {});
    const id = setInterval(() => {
      fetch('https://api.frankfurter.app/latest?from=USD&to=KRW')
        .then(r => r.json()).then(d => setRate(Math.round(d.rates.KRW))).catch(() => {});
    }, 30 * 60 * 1000);
    return () => clearInterval(id);
  }, []);
  return rate;
}

function useClock() {
  const [now, setNow] = useState(new Date());
  useEffect(() => {
    const id = setInterval(() => setNow(new Date()), 1000);
    return () => clearInterval(id);
  }, []);
  const fmt = (tz, opts) => now.toLocaleString('ko-KR', { timeZone: tz, ...opts });
  return {
    seattleTime: fmt('America/Los_Angeles', { hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:true }),
    seattleDate: fmt('America/Los_Angeles', { month:'long', day:'numeric', weekday:'short' }),
    koreaTime:   fmt('Asia/Seoul', { hour:'2-digit', minute:'2-digit', hour12:true }),
  };
}

function useInstallPrompt() {
  const [prompt, setPrompt] = useState(null);
  useEffect(() => {
    const handler = e => { e.preventDefault(); setPrompt(e); };
    window.addEventListener('beforeinstallprompt', handler);
    return () => window.removeEventListener('beforeinstallprompt', handler);
  }, []);
  const install = useCallback(async () => {
    if (!prompt) return;
    prompt.prompt();
    await prompt.userChoice;
    setPrompt(null);
  }, [prompt]);
  return { canInstall: !!prompt, install };
}

/* ══════════════════════════════════════
   PARTICLE CANVAS
══════════════════════════════════════ */
function ParticleCanvas({ mood }) {
  const rafRef = useRef();
  useEffect(() => {
    const canvas = document.getElementById('particle-canvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let particles = [];
    const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    resize();
    window.addEventListener('resize', resize);

    const count = mood === 'rain' || mood === 'drizzle' ? 55 : 28;

    for (let i = 0; i < count; i++) {
      particles.push(makeParticle(mood, canvas, true));
    }

    function makeParticle(m, c, init) {
      const isRain = m === 'rain' || m === 'drizzle';
      return {
        x: Math.random() * c.width,
        y: init ? Math.random() * c.height : -20,
        vx: isRain ? -0.5 + Math.random() * -1 : (Math.random() - 0.5) * 0.4,
        vy: isRain ? 4 + Math.random() * 5 : 0.6 + Math.random() * 0.8,
        size: isRain ? (0.8 + Math.random() * 1.2) : (3 + Math.random() * 5),
        opacity: 0.2 + Math.random() * 0.5,
        rotation: Math.random() * Math.PI * 2,
        rotV: (Math.random() - 0.5) * 0.03,
        type: isRain ? 'rain' : (m === 'fog' ? 'leaf' : 'blossom'),
      };
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy; p.rotation += p.rotV;
        if (p.y > canvas.height + 20 || p.x < -20 || p.x > canvas.width + 20) {
          particles[i] = makeParticle(mood, canvas, false);
          return;
        }
        ctx.save(); ctx.globalAlpha = p.opacity;
        ctx.translate(p.x, p.y); ctx.rotate(p.rotation);
        if (p.type === 'rain') {
          ctx.strokeStyle = '#88aacc';
          ctx.lineWidth = p.size;
          ctx.lineCap = 'round';
          ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(p.vx * 3, p.vy * 3);
          ctx.stroke();
        } else if (p.type === 'blossom') {
          ctx.fillStyle = '#f2b8c8';
          ctx.beginPath();
          for (let j = 0; j < 5; j++) {
            const a = (j * 2 * Math.PI) / 5;
            ctx.ellipse(Math.cos(a) * p.size * 0.5, Math.sin(a) * p.size * 0.5, p.size * 0.45, p.size * 0.28, a, 0, Math.PI * 2);
          }
          ctx.fill();
        } else {
          ctx.fillStyle = '#8a9a6a';
          ctx.beginPath();
          ctx.ellipse(0, 0, p.size * 1.2, p.size * 0.5, 0, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      });
      rafRef.current = requestAnimationFrame(draw);
    }
    rafRef.current = requestAnimationFrame(draw);
    return () => {
      cancelAnimationFrame(rafRef.current);
      window.removeEventListener('resize', resize);
    };
  }, [mood]);
  return null;
}

/* ══════════════════════════════════════
   VOICE AI COMPONENT
══════════════════════════════════════ */
function VoiceAI({ lang, segment, conditions }) {
  const [query, setQuery] = useState('');
  const [messages, setMessages] = useState([]);
  const [loading, setLoading] = useState(false);
  const [listening, setListening] = useState(false);
  const msgsRef = useRef(null);
  const textRef = useRef(null);

  const prompts = {
    newcomer: {
      ko: ['비자·SSN 뭐부터 해야 해요?', '린우드 한인타운 어디가 좋아요?', '시애틀 한인 교회 추천해줘'],
      en: ['What to do first — visa & SSN?', 'Best Korean neighborhoods?', 'Korean church recommendations?'],
    },
    traveler: {
      ko: ['3일 코스 어떻게 짜요?', '비 오는 날 뭘 해요?', '한식 맛집 추천'],
      en: ['Best 3-day itinerary?', 'What to do on a rainy day?', 'Best Korean restaurants?'],
    },
    returner: {
      ko: ['6년 만에 왔어요. 뭐가 바뀌었나요?', '한인 커뮤니티 요즘 어때요?', '재정착 지원 있나요?'],
      en: ['Back after 6 years — what changed?', 'How is the Korean community now?', 'Any resettlement support?'],
    },
  };

  const currentPrompts = (prompts[segment] || prompts.newcomer)[lang] || [];

  useEffect(() => {
    if (msgsRef.current) msgsRef.current.scrollTop = msgsRef.current.scrollHeight;
  }, [messages]);

  const sendMessage = useCallback(async (text) => {
    const q = (text || query).trim();
    if (!q || loading) return;
    setMessages(m => [...m, { role: 'user', text: q }]);
    setQuery('');
    setLoading(true);

    const systemPrompt = `You are HebronGuide, a warm and practical Korean community companion for Seattle.
Current Seattle conditions: ${JSON.stringify(conditions)}
User type: ${segment} (newcomer=moving long-term; traveler=short visit; returner=coming back after years away).
Reply in ${lang === 'ko' ? 'Korean' : 'English'}. Be specific, warm, reference today's actual conditions. ~150 words max. End with one concrete next step the user can take TODAY.`;

    try {
      const res = await fetch('/api/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userMessage: q, systemPrompt }),
      });
      const data = await res.json();
      setMessages(m => [...m, { role: 'ai', text: data.reply }]);
    } catch {
      setMessages(m => [...m, { role: 'ai', text: lang === 'ko' ? '잠시 후 다시 시도해 주세요.' : 'Please try again shortly.' }]);
    } finally {
      setLoading(false);
    }
  }, [query, loading, lang, segment, conditions]);

  const startVoice = useCallback(() => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { alert(lang === 'ko' ? '이 브라우저는 음성 인식을 지원하지 않습니다. Chrome을 사용해 주세요.' : 'Voice recognition requires Chrome browser.'); return; }
    const rec = new SR();
    rec.lang = lang === 'ko' ? 'ko-KR' : 'en-US';
    rec.interimResults = false;
    rec.maxAlternatives = 1;
    rec.onstart  = () => setListening(true);
    rec.onend    = () => setListening(false);
    rec.onresult = e => {
      const t = e.results[0][0].transcript;
      setQuery(t);
      setTimeout(() => sendMessage(t), 100);
    };
    rec.onerror  = () => setListening(false);
    rec.start();
  }, [lang, sendMessage]);

  return (
    <div className="voice-box">
      <div className="voice-label">
        {lang === 'ko' ? '🎤 AI 컨시어지 · 말하거나 입력하세요' : '🎤 AI Concierge · Speak or type'}
      </div>
      <div className="voice-row">
        <button className={`mic-btn${listening ? ' listening' : ''}`} onClick={startVoice} title={lang === 'ko' ? '음성으로 질문' : 'Ask by voice'}>
          <span className="mic-icon">{listening ? '⏹' : '🎤'}</span>
        </button>
        <div className="input-area">
          <textarea
            ref={textRef}
            className="voice-input"
            value={query}
            onChange={e => setQuery(e.target.value)}
            onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }}
            placeholder={lang === 'ko' ? '시애틀에 대해 무엇이든 물어보세요...' : 'Ask anything about Seattle...'}
            rows={1}
          />
          <button className="send-btn" onClick={() => sendMessage()} disabled={loading || !query.trim()}>
            {loading ? '···' : (lang === 'ko' ? '보내기 →' : 'Send →')}
          </button>
        </div>
      </div>
      <div className="prompts">
        {currentPrompts.map((p, i) => (
          <button key={i} className="prompt-chip" onClick={() => sendMessage(p)}>{p}</button>
        ))}
      </div>
      {messages.length > 0 && (
        <div className="ai-messages" ref={msgsRef}>
          {messages.map((m, i) => (
            <div key={i} className={`msg msg-${m.role}`}>{m.text}</div>
          ))}
          {loading && (
            <div className="msg msg-ai msg-loading">
              <div className="dot-bounce" /><div className="dot-bounce" /><div className="dot-bounce" />
            </div>
          )}
        </div>
      )}
    </div>
  );
}
