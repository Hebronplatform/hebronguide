<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>성도와 함께하는 VIP 환대 — 헤브론 파트너 교회 협력 문서</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html{background:#0d1117;scroll-behavior:smooth;}
body{font-family:'Noto Sans KR',-apple-system,sans-serif;background:#0d1117;color:#ECFDF5;line-height:1.8;min-height:100vh;}

@media print{
  body{background:#fff;color:#111;}
  header,footer{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .card{background:#f8f8f8!important;border:1px solid #ddd!important;}
  .no-print{display:none!important;}
  .lang-bar{display:none!important;}
}

/* ── 언어 토글 ── */
.lang-bar{
  position:sticky;top:0;z-index:200;
  display:flex;justify-content:flex-end;align-items:center;
  padding:10px 20px;gap:6px;
  background:rgba(13,17,23,.92);
  backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(255,255,255,.06);
}
.lang-btn{
  padding:6px 16px;border-radius:99px;font-size:.72rem;font-weight:800;
  font-family:'Noto Sans KR',sans-serif;cursor:pointer;
  border:1px solid rgba(255,255,255,.15);
  background:transparent;color:rgba(236,253,245,.4);
  transition:all .2s;letter-spacing:.04em;
}
.lang-btn.active{
  background:rgba(110,231,183,.15);
  border-color:rgba(110,231,183,.5);
  color:#6EE7B7;
}
.lang-btn:hover:not(.active){color:rgba(236,253,245,.7);border-color:rgba(255,255,255,.3);}

header{
  background:linear-gradient(160deg,#1a2535 0%,#0d1117 100%);
  border-bottom:1px solid rgba(255,255,255,0.07);
  padding:40px 24px 36px;
  text-align:center;
}
.priv-badge{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);
  border-radius:99px;padding:5px 18px;
  font-size:.7rem;font-weight:800;color:#fca5a5;letter-spacing:.07em;
  margin-bottom:18px;
}
header h1{
  font-family:'Noto Serif KR',serif;
  font-size:1.75rem;font-weight:700;line-height:1.35;
  color:#fff;margin-bottom:10px;
}
header h1 em{color:#6EE7B7;font-style:normal;}
header .lead{
  font-size:.88rem;color:rgba(236,253,245,.55);line-height:2;
  max-width:480px;margin:0 auto;
}
.container{max-width:620px;margin:0 auto;padding:36px 20px 100px;}
.sec{margin:44px 0 18px;}
.sec-label{font-size:.68rem;font-weight:800;color:#6EE7B7;letter-spacing:.12em;margin-bottom:8px;}
.sec h2{font-family:'Noto Serif KR',serif;font-size:1.2rem;font-weight:700;color:#fff;line-height:1.4;}
.card{
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  border-radius:16px;padding:22px 24px;margin-bottom:14px;
  position:relative;overflow:hidden;
}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;}
.card.green::before{background:linear-gradient(180deg,#6EE7B7,#34d399);}
.card.gold::before{background:linear-gradient(180deg,#C9A227,#b8901c);}
.card.purple::before{background:linear-gradient(180deg,#a78bfa,#7c3aed);}
.card.blue::before{background:linear-gradient(180deg,#60a5fa,#2563eb);}
.card-title{font-size:.95rem;font-weight:800;color:#fff;margin-bottom:7px;}
.card-body{font-size:.84rem;color:rgba(236,253,245,.68);line-height:1.9;}
.card-body strong{color:#ECFDF5;font-weight:700;}
.card-body em{color:#6EE7B7;font-style:normal;font-weight:700;}
.mindshift{
  background:linear-gradient(135deg,rgba(110,231,183,.08),rgba(201,162,39,.06));
  border:1px solid rgba(110,231,183,.2);border-radius:16px;padding:22px 24px;margin:20px 0;
}
.mindshift .q{font-family:'Noto Serif KR',serif;font-size:1rem;font-weight:700;color:#6EE7B7;margin-bottom:6px;line-height:1.5;}
.mindshift .a{font-size:.85rem;color:rgba(236,253,245,.75);line-height:1.9;}
.steps{display:flex;flex-direction:column;gap:14px;}
.step{display:flex;gap:16px;align-items:flex-start;}
.step-num{
  min-width:32px;height:32px;border-radius:50%;
  background:linear-gradient(135deg,#1a2535,#273444);
  border:1.5px solid rgba(110,231,183,.35);
  color:#6EE7B7;font-weight:900;font-size:.85rem;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.step-title{font-size:.9rem;font-weight:800;color:#fff;margin-bottom:3px;}
.step-desc{font-size:.82rem;color:rgba(236,253,245,.6);line-height:1.75;}
.biz-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0;}
.biz-item{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:12px 14px;}
.biz-emoji{font-size:1.4rem;margin-bottom:4px;}
.biz-name{font-size:.82rem;font-weight:700;color:#fff;margin-bottom:2px;}
.biz-desc{font-size:.72rem;color:rgba(236,253,245,.5);line-height:1.5;}
.verse-box{
  background:rgba(201,162,39,.07);border:1px solid rgba(201,162,39,.2);
  border-radius:14px;padding:18px 22px;margin:20px 0;text-align:center;
}
.verse-text{font-family:'Noto Serif KR',serif;font-size:.92rem;color:rgba(236,253,245,.85);line-height:1.85;font-style:italic;margin-bottom:8px;}
.verse-ref{font-size:.75rem;color:#C9A227;font-weight:700;}
.covenant{
  background:linear-gradient(135deg,rgba(201,162,39,.1),rgba(110,231,183,.06));
  border:1px solid rgba(201,162,39,.3);border-radius:16px;padding:24px;
}
.covenant h3{font-family:'Noto Serif KR',serif;font-size:1rem;font-weight:700;color:#C9A227;margin-bottom:14px;}
.covenant ul{list-style:none;display:flex;flex-direction:column;gap:10px;}
.covenant li{display:flex;align-items:flex-start;gap:10px;font-size:.85rem;color:rgba(236,253,245,.75);line-height:1.75;}
.covenant li::before{content:'✦';color:#C9A227;flex-shrink:0;margin-top:2px;font-size:.75rem;}
.contact{
  background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);
  border-radius:14px;padding:18px 20px;display:flex;align-items:center;gap:16px;text-decoration:none;
}
.contact-icon{font-size:2rem;flex-shrink:0;}
.contact-label{font-size:.72rem;color:rgba(236,253,245,.35);margin-bottom:2px;}
.contact-value{font-size:.95rem;font-weight:800;color:#6EE7B7;}
footer{
  background:rgba(255,255,255,.02);border-top:1px solid rgba(255,255,255,.06);
  text-align:center;padding:28px 24px;font-size:.72rem;color:rgba(236,253,245,.2);line-height:2;
}
footer strong{color:rgba(236,253,245,.4);}
.info-box{
  background:rgba(110,231,183,.06);border:1px solid rgba(110,231,183,.15);
  border-radius:12px;padding:14px 18px;margin-bottom:18px;
  font-size:.82rem;color:rgba(236,253,245,.7);line-height:1.9;
}
</style>
</head>
<body>

<!-- 언어 토글 -->
<div class="lang-bar no-print">
  <button class="lang-btn active" id="btn-ko" onclick="setLang('ko')">한국어</button>
  <button class="lang-btn" id="btn-en" onclick="setLang('en')">English</button>
  <span style="margin-left:8px;font-size:.68rem;color:rgba(236,253,245,.2);">|</span>
  <a onclick="window.print()" style="font-size:.72rem;color:rgba(201,162,39,.5);cursor:pointer;font-family:'Noto Sans KR',sans-serif;margin-left:8px;">🖨️</a>
</div>

<header>
  <div class="priv-badge" data-ko="🔒 헤브론 파트너 교회 전용 — 비공개 협력 문서" data-en="🔒 Hebron Partner Church Only — Private Document"></div>
  <h1 data-ko="성도와 함께하는<br><em>VIP 환대</em> 협력" data-en="<em>VIP Hospitality</em><br>Collaboration with Church Members"></h1>
  <p class="lead" data-ko="교회 성도들이 자신의 업종을 헤브론가이드에 올리는 것은<br>단순한 홍보가 아닙니다. 새로운 이민자를 맞이하는<br><strong style='color:#fff;'>환대의 손길</strong>입니다." data-en="When church members list their businesses on HebronGuide,<br>it is not simply marketing. It is an act of<br><strong style='color:#fff;'>hospitality</strong> toward newly arrived immigrants."></p>
</header>

<div class="container">

  <!-- 성경 구절 -->
  <div class="verse-box">
    <div class="verse-text"
      data-ko="&ldquo;내가 나그네 되었을 때 너희가 영접하였고,<br>헐벗었을 때에 옷을 입혔고,<br>병들었을 때에 돌보았고,<br>옥에 갇혔을 때에 와서 보았느니라&rdquo;"
      data-en="&ldquo;I was a stranger and you welcomed me,<br>I was naked and you clothed me,<br>I was sick and you visited me,<br>I was in prison and you came to me.&rdquo;">
    </div>
    <div class="verse-ref" data-ko="마태복음 25:35–36" data-en="Matthew 25:35–36"></div>
  </div>

  <!-- SECTION 01 -->
  <div class="sec">
    <div class="sec-label">SECTION 01</div>
    <h2 data-ko="성도의 업종 등재 —<br>홍보가 아니라 환대입니다" data-en="Member Business Listings —<br>Not Marketing, but Hospitality"></h2>
  </div>

  <div class="mindshift">
    <div class="q"
      data-ko="❓ &ldquo;내 가게를 올리는 게 교회와 무슨 관계가 있나요?&rdquo;"
      data-en="❓ &ldquo;What does listing my business have to do with the church?&rdquo;">
    </div>
    <div class="a"
      data-ko="새로 이민 온 한인이 처음 도착한 날 가장 필요한 것은 신뢰할 수 있는 정보입니다.<br>내 교회 성도가 운영하는 가게, 사무실, 클리닉이 가이드에 올라와 있다면 —<br>그 새가족은 낯선 도시에서 <strong>교회 공동체에 의해 먼저 돌봄 받는 경험</strong>을 합니다.<br>이것이 VIP 환대입니다."
      data-en="When a newly arrived Korean immigrant lands in a new city, what they need most is trustworthy information.<br>If the guide already lists businesses run by fellow church members —<br>that newcomer experiences <strong>being cared for by the church community before they even walk through the doors</strong>.<br>This is VIP Hospitality.">
    </div>
  </div>

  <div class="mindshift">
    <div class="q"
      data-ko="💡 의식의 전환: &ldquo;홍보&rdquo;에서 &ldquo;환대&rdquo;로"
      data-en="💡 Mindshift: From &ldquo;Marketing&rdquo; to &ldquo;Hospitality&rdquo;">
    </div>
    <div class="a"
      data-ko="기존 생각: <strong style='color:rgba(236,253,245,.4);'>&ldquo;내 가게를 더 알리고 싶다&rdquo; → 홍보</strong><br>새로운 시각: <strong style='color:#6EE7B7;'>&ldquo;새 이민자에게 내가 섬길 수 있다&rdquo; → 환대의 도구</strong><br><br>성도의 업종이 가이드에 올라오는 순간,<br>그 성도는 <em>파송받은 환대 사역자</em>가 됩니다."
      data-en="Old mindset: <strong style='color:rgba(236,253,245,.4);'>&ldquo;I want more people to know my business.&rdquo; → Marketing</strong><br>New perspective: <strong style='color:#6EE7B7;'>&ldquo;I can serve a newly arrived immigrant.&rdquo; → A tool of hospitality</strong><br><br>The moment a member's business is listed on the guide,<br>that member becomes <em>a sent minister of hospitality</em>.">
    </div>
  </div>

  <!-- SECTION 02 -->
  <div class="sec">
    <div class="sec-label">SECTION 02</div>
    <h2 data-ko="어떤 업종이 새가족에게<br>가장 필요한가" data-en="What Industries Are<br>Most Needed by New Arrivals"></h2>
  </div>

  <p style="font-size:.84rem;color:rgba(236,253,245,.55);margin-bottom:14px;"
    data-ko="이민자가 도착 첫 주에 반드시 필요한 것들입니다. 우리 교회 성도 중에 아래 분야가 있다면 꼭 등재를 권유해 주세요."
    data-en="These are what immigrants absolutely need in their first week. If any church members work in these fields, encourage them to be listed.">
  </p>

  <div class="biz-grid">
    <div class="biz-item">
      <div class="biz-emoji">🏥</div>
      <div class="biz-name" data-ko="의료 · 한의원" data-en="Medical · Korean Medicine"></div>
      <div class="biz-desc" data-ko="한국어 진료 가능한 가정의, 한의원, 치과, 안과" data-en="Korean-speaking GP, acupuncture, dental, ophthalmology"></div>
    </div>
    <div class="biz-item">
      <div class="biz-emoji">⚖️</div>
      <div class="biz-name" data-ko="법률 · 이민법" data-en="Legal · Immigration Law"></div>
      <div class="biz-desc" data-ko="이민 서류, 비자, 시민권 관련 법률 상담" data-en="Immigration documents, visa, citizenship legal counsel"></div>
    </div>
    <div class="biz-item">
      <div class="biz-emoji">🏠</div>
      <div class="biz-name" data-ko="부동산" data-en="Real Estate"></div>
      <div class="biz-desc" data-ko="집 구하기, 렌트, 첫 주택 구매 도움" data-en="Finding housing, renting, first home purchase guidance"></div>
    </div>
    <div class="biz-item">
      <div class="biz-emoji">📚</div>
      <div class="biz-name" data-ko="교육 · 학원" data-en="Education · Tutoring"></div>
      <div class="biz-desc" data-ko="자녀 영어, 한국학교, SAT/ACT, 대학 상담" data-en="Children's English, Korean school, SAT/ACT, college counseling"></div>
    </div>
    <div class="biz-item">
      <div class="biz-emoji">💰</div>
      <div class="biz-name" data-ko="세무 · 회계" data-en="Tax · Accounting"></div>
      <div class="biz-desc" data-ko="세금 신고, SSN, ITIN, 소상공인 회계" data-en="Tax filing, SSN, ITIN, small business accounting"></div>
    </div>
    <div class="biz-item">
      <div class="biz-emoji">🍽️</div>
      <div class="biz-name" data-ko="한식당 · 카페" data-en="Korean Restaurant · Café"></div>
      <div class="biz-desc" data-ko="한국 음식이 그리운 새 이민자의 첫 위로" data-en="The first comfort for a homesick new immigrant"></div>
    </div>
    <div class="biz-item">
      <div class="biz-emoji">✂️</div>
      <div class="biz-name" data-ko="미용 · 뷰티" data-en="Hair · Beauty"></div>
      <div class="biz-desc" data-ko="한국식 헤어, 네일, 피부 관리 서비스" data-en="Korean-style hair, nails, skincare services"></div>
    </div>
    <div class="biz-item">
      <div class="biz-emoji">🚗</div>
      <div class="biz-name" data-ko="자동차 · 운전" data-en="Auto · Driving"></div>
      <div class="biz-desc" data-ko="중고차 구매 도움, 운전면허 취득 안내" data-en="Used car purchase help, driver's license guidance"></div>
    </div>
    <div class="biz-item">
      <div class="biz-emoji">📦</div>
      <div class="biz-name" data-ko="이사 · 물류" data-en="Moving · Logistics"></div>
      <div class="biz-desc" data-ko="공항 픽업, 이사 도움, 짐 보관" data-en="Airport pickup, moving help, storage"></div>
    </div>
    <div class="biz-item">
      <div class="biz-emoji">💼</div>
      <div class="biz-name" data-ko="취업 · 커리어" data-en="Jobs · Career"></div>
      <div class="biz-desc" data-ko="이력서, 인터뷰 코칭, 직업 소개" data-en="Resume, interview coaching, job placement"></div>
    </div>
  </div>

  <!-- SECTION 03 -->
  <div class="sec">
    <div class="sec-label">SECTION 03</div>
    <h2 data-ko="성도에게 어떻게<br>이야기를 꺼내는가" data-en="How to Bring It Up<br>with Church Members"></h2>
  </div>

  <div class="card green">
    <div class="card-title"
      data-ko="📢 주보 또는 광고 시간 — 1분 안내문 (예시)"
      data-en="📢 Bulletin / Announcement — 1-Minute Script (example)">
    </div>
    <div class="card-body"
      data-ko="<em>&ldquo;우리 교회가 연계된 헤브론가이드는 전 세계 한인 이민자들이 새 도시에서 정착할 때 가장 먼저 찾는 가이드입니다. 성도님이 운영하시는 업종이나 서비스를 등재해 주시면, 새로 오시는 분들이 믿을 수 있는 분을 먼저 만나는 축복이 됩니다. 이것이 우리의 환대 사역입니다. 등재는 무료이며, 담당 목사님께 말씀해 주세요.&rdquo;</em>"
      data-en="<em>&ldquo;HebronGuide, which our church partners with, is the first guide Korean immigrants turn to when settling in a new city. If you list your business or service, newcomers will have the blessing of meeting someone they can trust right away. This is our ministry of hospitality. Listing is free — just let your pastor know.&rdquo;</em>">
    </div>
  </div>

  <div class="card gold">
    <div class="card-title"
      data-ko="💬 소그룹 목장 나눔 질문 (목자 활용)"
      data-en="💬 Small Group Discussion Question (for group leaders)">
    </div>
    <div class="card-body"
      data-ko="<strong>&ldquo;만약 하나님이 새로 이민 온 한인에게 누군가를 먼저 보내주신다면, 그 &lsquo;누군가&rsquo;가 나일 수도 있다는 생각을 해 본 적 있으신가요?&rdquo;</strong><br><br>이 질문 이후, 헤브론가이드 등재를 <em>구체적인 환대의 실천 방법</em>으로 제안하세요."
      data-en="<strong>&ldquo;If God were to send someone ahead to welcome a newly arrived Korean immigrant, have you ever thought that &lsquo;someone&rsquo; could be you?&rdquo;</strong><br><br>After this question, propose listing on HebronGuide as <em>a concrete way to put hospitality into practice</em>.">
    </div>
  </div>

  <div class="card purple">
    <div class="card-title"
      data-ko="📱 성도에게 보내는 카카오 메시지 (복붙 사용)"
      data-en="📱 Message to Send Church Members (copy &amp; paste)">
    </div>
    <div class="card-body"
      data-ko="<em>&ldquo;집사님, 안녕하세요. 목사입니다 🙏<br><br>헤브론가이드(hebronguide.com)에 집사님 업소를 올려도 될까요? 새로 이민 온 분들이 믿을 수 있는 분을 찾을 때 집사님이 먼저 연결될 수 있어요. 무료이고, 등재 후 제가 직접 확인합니다. 하시겠으면 업소명, 주소, 전화번호, 홈페이지(있으면) 알려 주세요.&rdquo;</em>"
      data-en="<em>&ldquo;Hello, this is Pastor [Name] 🙏<br><br>May we list your business on HebronGuide (hebronguide.com)? When newly arrived immigrants are searching for someone they can trust, your business could be their first connection. It&rsquo;s completely free, and I&rsquo;ll personally verify it after listing. If you&rsquo;re interested, please share your business name, address, phone number, and website (if any).&rdquo;</em>">
    </div>
  </div>

  <!-- SECTION 04 -->
  <div class="sec">
    <div class="sec-label">SECTION 04</div>
    <h2 data-ko="등재 절차 — 목사님이 직접 진행합니다" data-en="Listing Process — Pastor Handles It Directly"></h2>

<script>
// ── 언어 데이터 초기화 ──
const LANG_KEY = 'hg_partner_lang';
let currentLang = localStorage.getItem(LANG_KEY) || 'ko';

function setLang(lang) {
  currentLang = lang;
  localStorage.setItem(LANG_KEY, lang);
  document.documentElement.lang = lang;

  // 모든 data-ko / data-en 요소 교체
  document.querySelectorAll('[data-ko]').forEach(el => {
    const val = el.getAttribute('data-' + lang);
    if (val !== null) el.innerHTML = val;
  });

  // 버튼 상태
  document.getElementById('btn-ko').classList.toggle('active', lang === 'ko');
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');

  // title
  document.title = lang === 'ko'
    ? '성도와 함께하는 VIP 환대 — 헤브론 파트너 교회 협력 문서'
    : 'VIP Hospitality Collaboration — Hebron Partner Church Document';
}

// 페이지 로드 시 적용
document.addEventListener('DOMContentLoaded', () => setLang(currentLang));
</script>
