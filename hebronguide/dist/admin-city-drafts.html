<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>도시 초안 검증 — HebronGuide City Engine</title>
<style>
  :root{ --bg:#0d1117; --card:#161d29; --line:rgba(255,255,255,.1); --gold:#C9A227; --mint:#6EE7B7; --text:#ECFDF5; --muted:#8b93a1; --warn:#FBBF24; }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'Noto Sans KR','Apple SD Gothic Neo',sans-serif;line-height:1.7;}
  .wrap{max-width:860px;margin:0 auto;padding:28px 16px 80px;}
  h1{font-size:1.3rem;margin:0 0 4px;} .sub{color:var(--muted);font-size:.85rem;margin-bottom:20px;}
  .principle{background:rgba(201,162,39,.08);border:1px solid rgba(201,162,39,.3);border-radius:12px;padding:12px 14px;font-size:.8rem;color:#e4d9b8;margin-bottom:22px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:16px;}
  .card h2{font-size:1.05rem;margin:0 0 2px;} .meta{font-size:.78rem;color:var(--muted);margin-bottom:10px;}
  .badge{display:inline-block;border-radius:99px;padding:2px 10px;font-size:.7rem;font-weight:800;margin-left:8px;vertical-align:middle;}
  .b-draft{background:rgba(251,191,36,.15);color:var(--warn);border:1px solid rgba(251,191,36,.35);}
  .b-verified{background:rgba(110,231,183,.15);color:var(--mint);border:1px solid rgba(110,231,183,.35);}
  .section{border-top:1px solid var(--line);padding:10px 0 4px;}
  .section .k{font-size:.75rem;font-weight:800;color:var(--gold);letter-spacing:.04em;}
  .section pre{white-space:pre-wrap;font-family:inherit;font-size:.82rem;color:rgba(236,253,245,.85);margin:6px 0;background:rgba(0,0,0,.25);border-radius:8px;padding:10px 12px;max-height:260px;overflow:auto;}
  .need{color:var(--warn);font-weight:700;}
  .src a{color:var(--mint);font-size:.75rem;word-break:break-all;}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:12px;}
  input,textarea{background:#1a2535;border:1px solid var(--line);border-radius:10px;color:var(--text);padding:10px 12px;font-size:.85rem;font-family:inherit;}
  button{background:linear-gradient(135deg,var(--mint),#34D399);color:#0d1117;border:none;border-radius:10px;padding:11px 18px;font-weight:800;font-size:.85rem;cursor:pointer;font-family:inherit;}
  button.secondary{background:rgba(255,255,255,.08);color:var(--text);border:1px solid var(--line);}
  .newbox{border:1px dashed rgba(110,231,183,.35);}
  .newbox input,.newbox textarea{width:100%;margin-bottom:8px;}
  #status{font-size:.8rem;color:var(--mint);margin-top:8px;min-height:1.2em;}
  .empty{text-align:center;color:var(--muted);padding:30px 0;font-size:.85rem;}
</style>
</head>
<body>
<div class="wrap">
  <h1>도시 초안 검증</h1>
  <div class="sub">City Engine v2 — AI 초안은 여기서 사람이 검증하기 전까지 절대 공개되지 않습니다.</div>
  <div class="principle">
    검증 원칙: 그 도시에 살아본 한인이, 각 항목을 공식 출처와 대조한 뒤에만 "검증 완료"를 누릅니다.
    "[검증필요]" 표시 항목과 "출처 필요" 항목을 반드시 확인하세요. 투명성이 권위입니다.
  </div>

  <!-- 새 초안 요청 -->
  <div class="card newbox">
    <h2 style="font-size:.95rem;">새 도시 초안 요청 (AI)</h2>
    <div class="meta">AI가 초안을 만들고 draft 상태로 저장합니다. 발행되지 않습니다.</div>
    <input id="nNameKo" placeholder="도시명 한국어 (예: 쿠알라룸푸르)">
    <input id="nNameEn" placeholder="City Name English (예: Kuala Lumpur)">
    <input id="nCountry" placeholder="국가 (예: 말레이시아)">
    <textarea id="nRaw" rows="3" placeholder="원자료 (선택 — 직접 리서치한 자료 붙여넣기. AI 추측을 줄여줍니다)"></textarea>
    <div class="row">
      <button onclick="requestDraft()">초안 생성 요청</button>
      <span id="status"></span>
    </div>
  </div>

  <div id="list"><div class="empty">불러오는 중...</div></div>
</div>

<script>
const SB = 'https://vextxqzggznulwpganwt.supabase.co';
const ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZleHR4cXpnZ3pudWx3cGdhbnd0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4MTUzOTIsImV4cCI6MjA5NDM5MTM5Mn0.XghaQZYtI-dq5mf8i-DPVCxtw_XBBjxGUnvaiwGQFWk';
const H = { apikey: ANON, Authorization: 'Bearer ' + ANON };

// 관리자 비밀번호 — 서버(api/city-draft)가 SHA-256으로 검증. 여기 저장 안 함(세션만).
let adminPw = sessionStorage.getItem('hg_city_pw') || '';
function getPw() {
  if (!adminPw) { adminPw = prompt('관리자 비밀번호'); if (adminPw) sessionStorage.setItem('hg_city_pw', adminPw); }
  return adminPw;
}

function esc(s){ return String(s ?? '').replace(/</g,'&lt;'); }
function mark(s){ return esc(s).replace(/\[검증필요\]/g, '<span class="need">[검증필요]</span>').replace(/출처 필요/g, '<span class="need">출처 필요</span>'); }

async function load() {
  const r = await fetch(SB + '/rest/v1/city_drafts?select=*&order=updated_at.desc', { headers: H });
  if (!r.ok) { document.getElementById('list').innerHTML = '<div class="empty">테이블 없음 또는 조회 실패 — supabase_setup_city_pipeline.sql을 먼저 실행하세요. (HTTP ' + r.status + ')</div>'; return; }
  const rows = await r.json();
  if (!rows.length) { document.getElementById('list').innerHTML = '<div class="empty">초안이 없습니다. 위에서 새 도시 초안을 요청하세요.</div>'; return; }
  document.getElementById('list').innerHTML = rows.map(d => {
    const g = d.guide_json || {};
    const sections = ['city_profile','living','safety','transport','education_health','churches','diaspora_tips','mission_points','seo'];
    const body = sections.filter(k => g[k]).map(k => {
      const src = (d.sources_json && d.sources_json[k]) || (g[k] && g[k].sources) || [];
      const srcHtml = Array.isArray(src) && src.length
        ? '<div class="src">출처: ' + src.map(u => /^https?:/.test(u) ? '<a href="'+esc(u)+'" target="_blank" rel="noopener">'+esc(u)+'</a>' : '<span class="need">'+esc(u)+'</span>').join(' · ') + '</div>'
        : '<div class="src"><span class="need">출처 필요</span></div>';
      return '<div class="section"><span class="k">' + k + '</span><pre>' + mark(JSON.stringify(g[k], null, 1)) + '</pre>' + srcHtml + '</div>';
    }).join('');
    const verified = d.status === 'verified' || d.status === 'published';
    return '<div class="card"><h2>' + esc(d.name_ko) + ' (' + esc(d.name_en) + ')'
      + '<span class="badge ' + (verified ? 'b-verified' : 'b-draft') + '">' + esc(d.status) + '</span></h2>'
      + '<div class="meta">slug: ' + esc(d.slug) + ' · ' + esc(d.country || '') + (d.verified_by ? ' · 검증: ' + esc(d.verified_by) + ' (' + (d.verified_at||'').slice(0,10) + ')' : '') + '</div>'
      + body
      + (verified
          ? '<div class="row"><span style="font-size:.8rem;color:var(--mint);">검증 완료 — 다음: node scripts/scaffold-city.mjs ' + esc(d.slug) + ' --dry</span></div>'
          : '<div class="row"><input id="vb-' + esc(d.slug) + '" placeholder="검증자 이름 (그 도시에 살아본 분)" style="flex:1;min-width:200px;">'
            + '<button onclick="verify(\'' + esc(d.slug) + '\')">검증 완료</button></div>')
      + '</div>';
  }).join('');
}

async function requestDraft() {
  const pw = getPw(); if (!pw) return;
  const nameKo = document.getElementById('nNameKo').value.trim();
  const nameEn = document.getElementById('nNameEn').value.trim();
  const country = document.getElementById('nCountry').value.trim();
  const rawTxt = document.getElementById('nRaw').value.trim();
  if (!nameKo || !nameEn || !country) { alert('도시명(한/영)과 국가는 필수'); return; }
  document.getElementById('status').textContent = 'AI 초안 생성 중... (수십 초 걸릴 수 있음)';
  const r = await fetch('/api/city-draft', { method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ token: pw, action:'draft', nameKo, nameEn, country, rawData: rawTxt || undefined }) });
  const d = await r.json();
  if (r.status === 401) { sessionStorage.removeItem('hg_city_pw'); adminPw=''; alert('비밀번호 오류'); return; }
  document.getElementById('status').textContent = d.ok ? ('초안 저장됨: ' + d.slug + ' — 아래 목록에서 검증하세요') : ('오류: ' + (d.error || r.status));
  load();
}

async function verify(slug) {
  const pw = getPw(); if (!pw) return;
  const name = document.getElementById('vb-' + slug).value.trim();
  if (!name) { alert('검증자 이름을 입력하세요 — 투명성이 권위입니다'); return; }
  if (!confirm('"' + slug + '" 초안의 모든 [검증필요]·출처를 공식 자료와 대조하셨습니까?')) return;
  const r = await fetch('/api/city-draft', { method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ token: pw, action:'verify', slug, verifiedBy: name }) });
  const d = await r.json();
  if (r.status === 401) { sessionStorage.removeItem('hg_city_pw'); adminPw=''; alert('비밀번호 오류'); return; }
  alert(d.ok ? '검증 완료 기록됨' : '오류: ' + (d.error || r.status));
  load();
}

load();
</script>
</body>
</html>
