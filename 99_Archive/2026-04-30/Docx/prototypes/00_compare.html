<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HebronGuide — 3개 스타일 비교</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Pretendard Variable', -apple-system, sans-serif;
      background: #0a0a0a; color: #f5f5f7; min-height: 100vh;
    }
    header {
      padding: 32px 24px; text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 8px; }
    p { color: #a1a1a6; font-size: 14px; }
    .grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 0;
      height: calc(100vh - 110px);
    }
    @media (max-width: 1100px) {
      .grid { grid-template-columns: 1fr; height: auto; }
      .frame-wrap { height: 800px; }
    }
    .frame-wrap {
      position: relative; height: 100%;
      border-right: 1px solid rgba(255,255,255,0.08);
      overflow: hidden;
    }
    .frame-wrap:last-child { border-right: none; }
    .frame-label {
      position: absolute; top: 12px; left: 12px; z-index: 10;
      padding: 6px 12px; border-radius: 100px;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
      color: #fff; font-size: 12px; font-weight: 600;
      letter-spacing: 0.04em;
    }
    .frame-label.apple  { background: rgba(0,0,0,0.85); }
    .frame-label.linear { background: rgba(124, 92, 255, 0.85); }
    .frame-label.stripe { background: rgba(99, 91, 255, 0.85); }
    iframe {
      width: 100%; height: 100%;
      border: none;
      transform-origin: top left;
      transform: scale(0.55);
      width: calc(100% / 0.55);
      height: calc(100% / 0.55);
    }
    .open-link {
      position: absolute; bottom: 16px; right: 16px; z-index: 10;
      padding: 8px 14px; border-radius: 100px;
      background: #f5f5f7; color: #000;
      font-size: 13px; font-weight: 600;
      text-decoration: none; transition: transform .15s;
    }
    .open-link:hover { transform: translateY(-1px); }
  </style>
</head>
<body>
  <header>
    <h1>HebronGuide — 3가지 디자인 스타일 비교</h1>
    <p>각 미리보기를 클릭하면 새 창에서 풀 사이즈로 열립니다. 마음에 드는 스타일을 알려주세요.</p>
  </header>

  <div class="grid">
    <div class="frame-wrap">
      <span class="frame-label apple">① Apple Style — 절제·검정·여백</span>
      <iframe src="01_apple_style.html" loading="lazy"></iframe>
      <a href="01_apple_style.html" target="_blank" class="open-link">전체 보기 →</a>
    </div>

    <div class="frame-wrap">
      <span class="frame-label linear">② Linear Style — 다크·보라 오로라·네온</span>
      <iframe src="02_linear_style.html" loading="lazy"></iframe>
      <a href="02_linear_style.html" target="_blank" class="open-link">전체 보기 →</a>
    </div>

    <div class="frame-wrap">
      <span class="frame-label stripe">③ Stripe Style — 라이트·다중 컬러·낙관적</span>
      <iframe src="03_stripe_style.html" loading="lazy"></iframe>
      <a href="03_stripe_style.html" target="_blank" class="open-link">전체 보기 →</a>
    </div>
  </div>
</body>
</html>
