<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">

  <!-- App icon — Navy rounded background -->
  <rect x="0" y="0" width="64" height="64" rx="13" fill="#1a2e6c"/>

  <!-- Outer ring -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.8"/>

  <!-- N point — Gold -->
  <polygon points="32,7 40,24 32,32 24,24" fill="#d4a017"/>

  <!-- S point — White -->
  <polygon points="32,57 40,40 32,32 24,40" fill="rgba(255,255,255,0.82)"/>

  <!-- E point — White, lighter -->
  <polygon points="57,32 40,40 32,32 40,24" fill="rgba(255,255,255,0.52)"/>

  <!-- W point — White, lighter -->
  <polygon points="7,32 24,24 32,32 24,40"  fill="rgba(255,255,255,0.52)"/>

  <!-- Center dot -->
  <circle cx="32" cy="32" r="2.5" fill="rgba(255,255,255,0.95)"/>

</svg>
