<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>단체 관광 신청 — 폴킴 시애틀 가이드</title>
  <meta name="theme-color" content="#1a5276">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Nanum Gothic', sans-serif;
      background: linear-gradient(160deg, #eaf4fb 0%, #f8fbff 100%);
      min-height: 100vh;
      padding: 24px 16px 48px;
      color: #1a1a1a;
    }
    .card {
      max-width: 520px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(26,82,118,0.13);
      overflow: hidden;
    }
    /* 헤더 */
    .header {
      background: linear-gradient(135deg, #1a3a5c 0%, #1a5276 60%, #2980b9 100%);
      padding: 28px 24px 22px;
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content:''; position:absolute; top:-30px; right:-30px;
      width:140px; height:140px; background:rgba(255,255,255,0.07); border-radius:50%;
    }
    .header::after {
      content:''; position:absolute; bottom:-40px; left:-20px;
      width:120px; height:120px; background:rgba(255,255,255,0.05); border-radius:50%;
    }
    .header-inner { position:relative; z-index:1; }
    .header-icon { font-size:2em; margin-bottom:8px; }
    .header-title { font-size:1.25em; font-weight:900; color:white; letter-spacing:-0.3px; }
    .header-sub   { font-size:0.8em; color:rgba(255,255,255,0.8); margin-top:4px; line-height:1.6; }
    .header-tags  { display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; }
    .header-tag   {
      background:rgba(255,255,255,0.18); color:white;
      font-size:0.7em; font-weight:700; padding:3px 10px; border-radius:10px;
    }
    /* 폼 영역 */
    .form-body { padding: 22px 20px 28px; display:flex; flex-direction:column; gap:14px; }
    .field label {
      display:block; font-size:0.74rem; font-weight:700;
      color:#1a5276; margin-bottom:4px;
    }
    .field input, .field textarea, .field select {
      width:100%; padding:10px 12px;
      border-radius:10px; border:1.5px solid #d0e8f5;
      font-size:0.83rem; outline:none;
      transition:border-color .2s;
      font-family:inherit;
    }
    .field input:focus, .field textarea:focus {
      border-color:#2980b9;
      box-shadow:0 0 0 3px rgba(41,128,185,0.1);
    }
    .field textarea { resize:vertical; }
    .row2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    /* 유형 버튼 */
    .type-btns { display:flex; flex-wrap:wrap; gap:7px; margin-top:2px; }
    .type-btn {
      padding:6px 14px; border-radius:20px;
      border:1.5px solid #2980b9;
      background:white; color:#1a5276;
      font-size:0.76rem; font-weight:700; cursor:pointer;
      transition:all .15s;
    }
    .type-btn.on { background:#1a5276; color:white; }
    /* 제출 버튼 */
    .submit-btn {
      width:100%; padding:13px;
      background:linear-gradient(135deg,#1a5276,#2980b9);
      color:white; border:none; border-radius:12px;
      font-size:0.9rem; font-weight:800; cursor:pointer;
      letter-spacing:0.3px;
      transition:opacity .2s;
      margin-top:4px;
    }
    .submit-btn:active { opacity:0.85; }
    .form-note {
      font-size:0.7rem; color:#999; text-align:center; line-height:1.6;
    }
    /* 완료 메시지 */
    #done-msg {
      display:none; padding:32px 24px; text-align:center;
    }
    #done-msg .done-icon { font-size:2.8em; margin-bottom:12px; }
    #done-msg .done-title { font-size:1.1em; font-weight:800; color:#1a5276; margin-bottom:8px; }
    #done-msg .done-sub { font-size:0.82rem; color:#555; line-height:1.7; }
    /* 닫기 버튼 */
    .close-btn {
      display:block; margin:20px auto 0;
      padding:10px 28px; border-radius:20px;
      background:#f0f7ff; border:1.5px solid #c8e0f4;
      color:#1a5276; font-size:0.82rem; font-weight:700; cursor:pointer;
    }
  </style>
</head>
<body>

<div class="card">

  <!-- 헤더 -->
  <div class="header">
    <div class="header-inner">
      <div class="header-icon">🚌</div>
      <div class="header-title">단체 관광 신청서</div>
      <div class="header-sub">
        폴킴 (Paul Kim) · 시애틀 단체 관광 가이드<br>
        워싱턴 DC · 시애틀 관광 가이드 경력 · 25년 시애틀 현지 거주
      </div>
      <div class="header-tags">
        <span class="header-tag">⛪ 교회 단체</span>
        <span class="header-tag">🏛️ 국가기관</span>
        <span class="header-tag">🏢 기업 단체</span>
        <span class="header-tag">👨‍👩‍👧 소그룹</span>
      </div>
    </div>
  </div>

  <!-- 폼 -->
  <div class="form-body" id="inquiry-form">

    <div class="field">
      <label>단체명 *</label>
      <input id="f-org" type="text" placeholder="예) 헤브론교회 · 삼성전자 · 외교부">
    </div>

    <div class="field">
      <label>담당자 이름 *</label>
      <input id="f-name" type="text" placeholder="이름을 입력해 주세요">
    </div>

    <div class="row2">
      <div class="field">
        <label>연락처 *</label>
        <input id="f-phone" type="tel" placeholder="010-0000-0000">
      </div>
      <div class="field">
        <label>이메일</label>
        <input id="f-email" type="email" placeholder="이메일 주소">
      </div>
    </div>

    <div class="row2">
      <div class="field">
        <label>방문 예정일 *</label>
        <input id="f-date" type="date">
      </div>
      <div class="field">
        <label>단체 인원 *</label>
        <input id="f-size" type="number" placeholder="명" min="1">
      </div>
    </div>

    <div class="field">
      <label>단체 유형</label>
      <div class="type-btns" id="f-type-btns">
        <button type="button" class="type-btn" onclick="toggleType(this)">⛪ 교회 단체</button>
        <button type="button" class="type-btn" onclick="toggleType(this)">🏛️ 국가기관</button>
        <button type="button" class="type-btn" onclick="toggleType(this)">🏢 기업 단체</button>
        <button type="button" class="type-btn" onclick="toggleType(this)">👨‍👩‍👧 가족·소그룹</button>
        <button type="button" class="type-btn" onclick="toggleType(this)">기타</button>
      </div>
    </div>

    <div class="field">
      <label>특별 요청 / 참고사항</label>
      <textarea id="f-note" rows="3" placeholder="희망 코스, 식사 제한, 이동 수단 등 자유롭게 적어주세요"></textarea>
    </div>

    <button class="submit-btn" onclick="submitInquiry()">✉️ 신청서 보내기</button>
    <div class="form-note">
      제출 시 이메일 앱이 열리며 <strong>Trevel3927@gmail.com</strong>으로 신청 내용이 전송됩니다.<br>
      사전 예약제로 운영되며 빠른 시일 내 연락드립니다.
    </div>

    <button class="close-btn" onclick="window.close()">✕ 닫기</button>
  </div>

  <!-- 완료 메시지 (이메일 앱 열린 후) -->
  <div id="done-msg">
    <div class="done-icon">✅</div>
    <div class="done-title">이메일 앱이 열렸습니다</div>
    <div class="done-sub">
      신청 내용이 이메일 본문에 자동으로 채워졌습니다.<br>
      확인 후 <strong>전송</strong>해 주시면 폴킴이 곧 연락드립니다.<br><br>
      ✉️ Trevel3927@gmail.com
    </div>
    <button class="close-btn" onclick="window.close()">창 닫기</button>
  </div>

</div>

<script>
function toggleType(btn){ btn.classList.toggle('on'); }

function submitInquiry(){
  var org   = document.getElementById('f-org').value.trim();
  var name  = document.getElementById('f-name').value.trim();
  var phone = document.getElementById('f-phone').value.trim();
  var email = document.getElementById('f-email').value.trim();
  var date  = document.getElementById('f-date').value;
  var size  = document.getElementById('f-size').value.trim();
  var note  = document.getElementById('f-note').value.trim();

  if(!org || !name || !phone || !date || !size){
    alert('필수 항목(*)을 모두 입력해 주세요.');
    return;
  }

  var types = [];
  document.querySelectorAll('#f-type-btns .type-btn.on').forEach(function(b){
    types.push(b.textContent.trim());
  });

  var body =
    '[단체 관광 신청서]\n\n' +
    '■ 단체명       : ' + org   + '\n' +
    '■ 담당자       : ' + name  + '\n' +
    '■ 연락처       : ' + phone + '\n' +
    '■ 이메일       : ' + (email || '—') + '\n' +
    '■ 방문 예정일  : ' + date  + '\n' +
    '■ 단체 인원    : ' + size  + '명\n' +
    '■ 단체 유형    : ' + (types.length ? types.join(', ') : '—') + '\n' +
    '■ 요청사항     : ' + (note  || '—') + '\n\n' +
    '— HebronGuide 시애틀 단체관광 신청';

  var mailto =
    'mailto:Trevel3927@gmail.com' +
    '?subject=' + encodeURIComponent('[단체관광 신청] ' + org + ' (' + date + ')') +
    '&body='    + encodeURIComponent(body);

  window.location.href = mailto;

  // 완료 메시지 표시
  setTimeout(function(){
    document.getElementById('inquiry-form').style.display = 'none';
    document.getElementById('done-msg').style.display = 'block';
  }, 800);
}
</script>
</body>
</html>
